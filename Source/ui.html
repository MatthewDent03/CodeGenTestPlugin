<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Figma to Tailwind Code Gen</title>
    <style>
      :root {
        --bg-start: #f0fafb;
        --bg-end: #f8fbfc;
        --panel-bg: rgba(255, 255, 255, 0.9);
        --panel-border: #e0e8ed;
        --text-primary: #1a1f24;
        --text-secondary: #5a6670;
        --accent: #0891b2;
        --accent-soft: rgba(8, 145, 178, 0.1);
        --accent-strong: #0e7490;
        --ui-zoom: 1;
        --sticky-hero-top: 8px;
        --sticky-header-offset: 62px;
      }

      * {
        box-sizing: border-box;
      }

      /* === Base Styles === */
      body {
        margin: 0;
        padding: 16px;
        background:
          radial-gradient(
            circle at 0% -20%,
            rgba(99, 102, 241, 0.22),
            transparent 46%
          ),
          radial-gradient(
            circle at 110% 0%,
            rgba(14, 165, 233, 0.18),
            transparent 40%
          ),
          linear-gradient(155deg, var(--bg-start), var(--bg-end));
        color: var(--text-primary);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Arial;
        min-height: 100vh;
        overflow-x: hidden;
        zoom: var(--ui-zoom);
      }

      body.is-resizing,
      body.is-resizing * {
        cursor: nwse-resize !important;
        user-select: none;
      }

      .ui-resize-handle {
        position: fixed;
        right: 8px;
        bottom: 8px;
        width: 18px;
        height: 18px;
        border: 1px solid #d4e1e8;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.1);
        cursor: nwse-resize;
        z-index: 120;
        backdrop-filter: blur(5px);
      }

      .ui-resize-handle::before {
        content: "";
        position: absolute;
        right: 3px;
        bottom: 3px;
        width: 9px;
        height: 9px;
        background: repeating-linear-gradient(
          135deg,
          #5a6670 0 1px,
          transparent 1px 3px
        );
        opacity: 0.6;
      }

      .plugin-shell {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .sidebar-nav {
        position: sticky;
        top: 8px;
        z-index: 170;
        width: 42px;
        flex: 0 0 42px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px 6px;
        border: 1px solid #d4e1e8;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
        backdrop-filter: blur(8px);
      }

      .sidebar-nav-btn {
        width: 100%;
        height: 30px;
        border: 1px solid #d4e1e8;
        border-radius: 6px;
        background: linear-gradient(180deg, #ffffff, #f8fbfc);
        color: #0891b2;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .sidebar-nav-btn:hover {
        border-color: #06b6d4;
        transform: translateY(-1px);
      }

      .sidebar-nav-btn.active {
        color: #ffffff;
        border-color: #0891b2;
        background: linear-gradient(135deg, #0891b2, #0e7490);
        box-shadow: 0 4px 12px rgba(8, 145, 178, 0.2);
      }

      .plugin-main {
        min-width: 0;
        flex: 1;
      }

      /* === Panel Layout === */
      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 18px;
        margin-bottom: 16px;
        position: relative;
        overflow: visible;
        box-shadow:
          0 4px 12px rgba(15, 23, 42, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(7px);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      .panel::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, #0891b2, #06b6d4 45%, #0284c7);
        opacity: 0.6;
        border-radius: 8px 8px 0 0;
        pointer-events: none;
      }

      .panel:hover {
        transform: translateY(-1px);
        border-color: #d4e1e8;
        box-shadow:
          0 8px 16px rgba(15, 23, 42, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .panel.panel-hero {
        padding: 10px 12px 30px;
        margin-bottom: 10px;
        border-color: #d4e1e8;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.95),
            rgba(248, 251, 252, 0.92)
          ),
          var(--panel-bg);
        box-shadow:
          0 8px 20px rgba(8, 145, 178, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
      }

      .panel.panel-hero::before {
        height: 2px;
        opacity: 0.95;
      }

      .panel.panel-hero .panel-header {
        align-items: center;
        margin-bottom: 4px;
      }

      .panel.panel-hero .panel-title-group {
        gap: 0;
      }

      .panel.panel-hero .title {
        font-size: 13px;
        font-weight: 700;
        margin: 0;
        letter-spacing: 0.1px;
        color: #1e1b4b;
        background: none;
        -webkit-text-fill-color: currentColor;
      }

      .panel.panel-hero .subtitle {
        display: none;
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .panel-title-group {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .panel-header-actions {
        display: flex;
        gap: 8px;
      }

      .floating-toolbar {
        position: sticky;
        top: 10px;
        z-index: 160;
        display: flex;
        justify-content: flex-end;
        margin-top: -44px;
        margin-bottom: 12px;
        padding-right: 10px;
        pointer-events: none;
      }

      .floating-toolbar .sticky-frame-chip {
        max-width: 210px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border: 1px solid #d4e1e8;
        background: #ffffff;
        color: #1a1f24;
        font-weight: 700;
        box-shadow: 0 2px 8px rgba(8, 145, 178, 0.08);
        opacity: 1;
        backdrop-filter: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: auto;
      }

      .floating-toolbar .panel-header-actions {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        pointer-events: auto;
      }

      .panel:not(.panel-hero) {
        padding-top: 14px;
      }

      .popout-btn {
        padding: 6px 10px;
        font-size: 12px;
      }

      /* === Typography === */
      .title {
        font-size: 19px;
        font-weight: 700;
        margin: 0 0 10px;
        letter-spacing: 0.2px;
        background: linear-gradient(95deg, #0e7490, #0891b2 55%, #0284c7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 12.5px;
        color: var(--text-secondary);
        margin: 0 0 10px;
      }

      #frame-name {
        font-size: 12px;
        font-weight: 600;
        color: #164e63;
        background: rgba(8, 145, 178, 0.08);
        border: 1px solid rgba(8, 145, 178, 0.15);
        border-radius: 999px;
        padding: 6px 10px;
        display: inline-flex;
        max-width: 100%;
        word-break: break-word;
      }

      /* === Properties List === */
      .properties {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* === Individual property row with key-value pair === */
      .property-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid #e5e9ed;
        border-radius: 6px;
        background: rgba(248, 250, 252, 0.9);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.03);
      }

      .property-key {
        min-width: 130px;
        color: var(--text-secondary);
        font-size: 13px;
      }

      .property-value {
        font-size: 13px;
        word-break: break-word;
      }

      .property-input {
        width: 100%;
        padding: 7px 9px;
        border-radius: 4px;
        border: 1px solid #d4e1e8;
        background: #ffffff;
        color: var(--text-primary);
        font-size: 13px;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .property-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.12);
      }

      .property-subgrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        width: 100%;
      }

      .property-subfield {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .property-subfield label {
        font-size: 11px;
        color: #5a6670;
      }

      /* === Tabs & Buttons === */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .code-preview-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .code-preview-topbar .tabs {
        margin-bottom: 0;
      }

      /* === button styling === */
      .button {
        padding: 8px 13px;
        border-radius: 6px;
        border: 1px solid #d4e1e8;
        background: linear-gradient(180deg, #ffffff, #f8fbfc);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 13px;
        font-weight: 550;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          transform 0.15s ease,
          box-shadow 0.2s ease;
      }

      .button:hover {
        background: linear-gradient(180deg, #ffffff, #f0fafb);
        border-color: #c0d9e0;
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(8, 145, 178, 0.1);
      }

      .button:active {
        transform: translateY(0);
      }

      .button.active {
        border-color: var(--accent);
        color: #ffffff;
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-strong)
        );
        box-shadow: 0 4px 12px rgba(8, 145, 178, 0.2);
      }

      .button.muted {
        color: var(--text-secondary);
      }

      .button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.15);
      }

      /* === Code Output Display === */
      pre {
        margin: 0;
        padding: 14px 16px;
        border-radius: 8px;
        border: 1px solid #1e293b;
        background: linear-gradient(180deg, #0f172a, #1a202c);
        overflow: visible;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 20px;
        tab-size: 2;
        color: #e2e8f0;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
      }

      /* === buttons container (Copy, Download) === */
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 12px;
      }

      .code-preview-actions {
        margin-top: 0;
        margin-left: auto;
      }

      /* === Color Swatches === */
      /* === Container for color chips === */
      .swatches {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      /* === Individual color swatch item === */
      .swatch {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #e5e9ed;
        border-radius: 6px;
        padding: 8px 10px;
        background: rgba(248, 250, 252, 0.95);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.03);
      }

      .swatch-color {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #e5e7eb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }

      .swatch-labels {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .swatch-name {
        font-size: 12px;
        color: #5a6670;
      }

      .swatch-value {
        font-size: 12px;
        color: #1a1f24;
      }

      /* === Child Fills === */
      .child-fills {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .child-fill-row {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #e5e9ed;
        border-radius: 6px;
        padding: 8px 10px;
        background: rgba(248, 250, 252, 0.95);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.03);
      }

      .child-fill-name {
        min-width: 120px;
        font-size: 12px;
        color: #5a6670;
      }

      .child-fill-swatch {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid #e5e7eb;
        flex-shrink: 0;
      }

      /* === Collapsible (W3Schools) === */
      .collapsible {
        background-color: rgba(248, 250, 252, 0.85);
        color: var(--text-primary);
        cursor: pointer;
        padding: 12px 14px;
        width: 100%;
        border: 1px solid #d4e1e8;
        text-align: left;
        outline: none;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 6px;
        position: sticky;
        top: var(--sticky-header-offset);
        z-index: 40;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
      }

      .collapsible.active,
      .collapsible:hover {
        background-color: #f0fafb;
        border-color: #c0d9e0;
      }

      .collapsible:after {
        content: "\002B";
        color: #5a6670;
        font-weight: bold;
        margin-left: auto;
      }

      .collapsible.active:after {
        content: "\2212";
      }

      .content {
        padding: 0 14px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease-out;
        background-color: transparent;
      }

      .content.open {
        margin-top: 8px;
        padding: 12px 14px 12px;
        border-top: 1px solid rgba(192, 217, 224, 0.6);
      }

      /* === Token Tabs and Tree === */
      .token-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        padding: 8px;
        border: 1px solid #d4e1e8;
        border-radius: 6px;
        background: rgba(248, 250, 252, 0.85);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
      }

      .token-tabs::-webkit-scrollbar {
        height: 6px;
      }

      .token-tabs::-webkit-scrollbar-track {
        background: #f0fafb;
      }

      .token-tabs::-webkit-scrollbar-thumb {
        background: #c0d9e0;
        border-radius: 3px;
      }

      .token-tabs::-webkit-scrollbar-thumb:hover {
        background: #a6c1cc;
      }

      .token-tab {
        padding: 7px 11px;
        border: 1px solid #d4e1e8;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffffff, #f8fbfc);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        color: #2d5a68;
        transition: all 0.2s ease;
        white-space: nowrap;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .token-tab.active {
        color: #ffffff;
        border-color: var(--accent);
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-strong)
        );
        box-shadow: 0 4px 10px rgba(8, 145, 178, 0.18);
        font-weight: 600;
      }

      .token-tab:hover {
        border-color: #c0d9e0;
        transform: translateY(-1px);
      }

      .token-tree {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 250px;
        overflow-y: auto;
      }

      .layout-controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
        border: 1px solid #d4e1e8;
        border-radius: 6px;
        background: rgba(248, 250, 252, 0.85);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
      }

      .layout-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .layout-section-title {
        font-size: 12px;
        font-weight: 700;
        color: #164e63;
        letter-spacing: 0.02em;
      }

      .layout-note {
        font-size: 11px;
        color: #5a6670;
        margin-top: -2px;
      }

      .layout-grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .layout-grid-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .token-search {
        margin-bottom: 12px;
        position: relative;
        background: rgba(224, 243, 248, 0.4);
        border: 1px solid #c0d9e0;
        border-radius: 6px;
        padding: 8px;
      }

      .token-search-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .token-search-label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: #0e7490;
        margin-bottom: 6px;
      }

      .token-search::before {
        content: "🔎";
        position: absolute;
        left: 16px;
        top: 33px;
        font-size: 12px;
        opacity: 0.75;
      }

      .token-search input {
        flex: 1;
        width: 100%;
        padding: 8px 10px 8px 30px;
        border-radius: 4px;
        border: 1px solid #c0d9e0;
        background: #ffffff;
        color: #1a1f24;
        font-size: 12.5px;
        font-weight: 500;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
      }

      .token-search input::placeholder {
        color: #0891b2;
      }

      .token-search input:focus {
        outline: none;
        border-color: #0891b2;
        box-shadow:
          0 0 0 3px rgba(8, 145, 178, 0.12),
          0 2px 6px rgba(8, 145, 178, 0.1);
      }

      .token-search-clear {
        flex-shrink: 0;
        padding: 8px 10px;
        border-radius: 4px;
        border: 1px solid #c0d9e0;
        background: #f0fafb;
        color: #0e7490;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .token-search-clear:hover {
        background: #e0f2f7;
      }

      .token-search-clear:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .color-alpha-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
        padding: 8px;
        border: 1px solid #d4e1e8;
        border-radius: 6px;
        background: rgba(248, 250, 252, 0.8);
      }

      .alpha-filter-btn {
        min-width: 30px;
        padding: 5px 8px;
        border-radius: 999px;
        border: 1px solid #d4e1e8;
        background: #ffffff;
        color: #164e63;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .alpha-filter-btn:hover {
        border-color: #c0d9e0;
      }

      .alpha-filter-btn.active {
        border-color: #0891b2;
        background: linear-gradient(135deg, #0891b2, #0e7490);
        color: #ffffff;
      }

      .custom-token-controls {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #d4e1e8;
        display: grid;
        gap: 6px;
      }

      .custom-token-row {
        display: flex;
        gap: 6px;
      }

      .custom-token-row input,
      .custom-token-row select {
        flex: 1;
        min-width: 0;
        padding: 6px 8px;
        border-radius: 4px;
        border: 1px solid #d4e1e8;
        background: #ffffff;
        color: #1a1f24;
        font-size: 12px;
      }

      .custom-token-row input[type="color"] {
        flex: 0 0 40px;
        padding: 2px;
        cursor: pointer;
      }

      .token-color-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .token-color-name {
        font-size: 12px;
        font-weight: 600;
        color: #164e63;
        padding: 4px 8px;
        background: #f0fafb;
        border-radius: 4px;
        cursor: pointer;
      }

      .token-color-name:hover {
        background: #e0f2f7;
      }

      .token-shades {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-left: 8px;
      }

      .token-shade {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 4px;
        background: #f8fbfc;
        border: 1px solid #e5e9ed;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .token-shade:hover {
        background: #f0fafb;
        border-color: #d4e1e8;
      }

      .token-swatch {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: 1px solid #d1d5db;
        flex-shrink: 0;
      }

      .token-shade-label {
        font-size: 11px;
        color: #5a6670;
        flex-grow: 1;
      }

      /* === Spacing Property Selector === */
      .spacing-property-selector {
        margin-bottom: 12px;
        padding: 10px 12px;
        background: #e0f2f7;
        border: 1px solid #c0d9e0;
        border-radius: 6px;
      }

    <script>
      /* === DOM Elements === */
      const frameName = document.getElementById("frame-name");
      const properties = document.getElementById("properties");
      const colorSwatches = document.getElementById("color-swatches");
      const childFills = document.getElementById("child-fills");
      const tokenTabs = document.getElementById("token-tabs");
      const layoutControls = document.getElementById("layout-controls");
      const tokenSearchInput = document.getElementById("token-search-input");
      const tokenSearchClearBtn = document.getElementById(
        "token-search-clear-btn",
      );
      const colorAlphaFilters = document.getElementById("color-alpha-filters");
      const tokenTree = document.getElementById("token-tree");
      const codeOutput = document.getElementById("code-output");
      const tabHtml = document.getElementById("tab-html");
      const tabTailwind = document.getElementById("tab-tailwind");
      const tabReactTailwind = document.getElementById("tab-react-tailwind");
      const undoButton = document.getElementById("undo-btn");
      const copyButton = document.getElementById("copy-btn");
      const downloadButton = document.getElementById("download-btn");
      const popoutButton = document.getElementById("popout-btn");
      const resizeHandle = document.getElementById("ui-resize-handle");
      const mainSidebarNav = document.getElementById("main-sidebar-nav");
      const applyToast = document.getElementById("apply-toast");

      const BASE_UI_SIZE = { width: 380, height: 920 };
      const UI_SCALE_CONFIG = {
        min: 0.9,
        max: 1.5,
        widthWeight: 0.62,
        heightWeight: 0.38,
      };
      const RESIZE_LIMITS = {
        minWidth: 320,
        minHeight: 640,
        maxWidth: 1280,
        maxHeight: 1600,
      };

      /* === App State === */
      /* Tracks current mode (html/tailwind/react-tailwind) and generated code */
      const appState = {
        mode: "html",
        html: "",
        tailwind: "",
        reactTailwind: "",
      };

      let isPoppedOut = false;
      let currentNodeId = null;
      let currentSelectionIds = [];
      let tokenSearchQuery = "";
      let customColors = {};
      let customGradients = {};
      let availableFontFamilies = [];
      let pendingApplyFeedback = false;
      let pendingApplyFeedbackTimer = null;
      let applyToastHideTimer = null;

      function markPendingApplyFeedback() {
        pendingApplyFeedback = true;
        if (pendingApplyFeedbackTimer) {
          clearTimeout(pendingApplyFeedbackTimer);
        }
        pendingApplyFeedbackTimer = setTimeout(() => {
          pendingApplyFeedback = false;
        }, 2200);
      }

      function showApplyToast(message = "Applied", level = "success") {
        if (!applyToast) return;
        applyToast.textContent = message;
        applyToast.classList.remove("success", "error", "info");
        applyToast.classList.add(
          level === "error" ? "error" : level === "info" ? "info" : "success",
        );
        applyToast.classList.add("show");
        if (applyToastHideTimer) {
          clearTimeout(applyToastHideTimer);
        }
        applyToastHideTimer = setTimeout(() => {
          applyToast.classList.remove("show");
        }, 1250);
      }

      function consumePendingApplyFeedback() {
        if (!pendingApplyFeedback) return;
        pendingApplyFeedback = false;
        if (pendingApplyFeedbackTimer) {
          clearTimeout(pendingApplyFeedbackTimer);
          pendingApplyFeedbackTimer = null;
        }
        showApplyToast("Applied", "success");
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function applyUiScale(
        width = window.innerWidth,
        height = window.innerHeight,
      ) {
        const widthRatio = width / BASE_UI_SIZE.width;
        const heightRatio = height / BASE_UI_SIZE.height;
        const weightedRatio =
          widthRatio * UI_SCALE_CONFIG.widthWeight +
          heightRatio * UI_SCALE_CONFIG.heightWeight;
        const scale = clamp(
          weightedRatio,
          UI_SCALE_CONFIG.min,
          UI_SCALE_CONFIG.max,
        );
        document.documentElement.style.setProperty("--ui-zoom", String(scale));
      }

      function setupManualResize() {
        if (!resizeHandle) return;

        let dragging = false;
        let startX = 0;
        let startY = 0;
        let startWidth = 0;
        let startHeight = 0;
        let rafId = null;
        let nextSize = null;

        const flushResize = () => {
          rafId = null;
          if (!nextSize) return;
          parent.postMessage(
            {
              pluginMessage: {
                type: "resize-ui",
                width: nextSize.width,
                height: nextSize.height,
              },
            },
            "*",
          );
        };

        const onPointerMove = (event) => {
          if (!dragging) return;

          const deltaX = event.clientX - startX;
          const deltaY = event.clientY - startY;
          const width = clamp(
            startWidth + deltaX,

          if ("$value" in node) return node;
          // Recursively process object properties
          const next = {};
          Object.entries(node).forEach(([key, value]) => {
            next[key] = toW3CTokens(value, [...path, key]);
          });
          return next;

        if (typeof node === "string") {

          return {
            $value: node,
            $type: inferTokenType(path),
            $description: path.join("."),
          };

        )
          .filter((letter) => letter !== "#")
          .sort();

        if (letters.length <= 1) {
          colorAlphaFilters.style.display = "none";
          currentColorLetterFilter = "ALL";
          colorAlphaFilters.innerHTML = "";
          return;
        }

        if (
          currentColorLetterFilter !== "ALL" &&
          !letters.includes(currentColorLetterFilter)
        ) {
          currentColorLetterFilter = "ALL";
        }

        colorAlphaFilters.style.display = "flex";
        colorAlphaFilters.innerHTML = "";

        const addButton = (value, label) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `alpha-filter-btn ${currentColorLetterFilter === value ? "active" : ""}`;
          btn.textContent = label;
          btn.addEventListener("click", () => {
            currentColorLetterFilter = value;
            renderTokenTree();
          });
          colorAlphaFilters.appendChild(btn);
        };

        addButton("ALL", "All");
        letters.forEach((letter) => addButton(letter, letter));
      }

      /* Render token tabs for each category */
      function renderTokenTabs() {
        tokenTabs.innerHTML = "";
        const categories = [...Object.keys(TAILWIND_TOKENS), "layout"];
        const categoryDisplayNames = {
          colors: "Colours",
          typography: "Text Styling",
          layout: "Flexbox / Layout",
        };
        categories.forEach((category) => {
          const btn = document.createElement("button");
          btn.className = `token-tab ${category === currentTokenCategory ? "active" : ""}`;
          btn.textContent =
            categoryDisplayNames[category] ||
            category.charAt(0).toUpperCase() + category.slice(1);
          btn.addEventListener("click", () => {
            currentTokenCategory = category;
            clearTokenSearch();
            renderTokenTabs();
            renderTokenTree();
            requestAnimationFrame(refreshOpenCollapsibles);
          });
          tokenTabs.appendChild(btn);
        });
      }

      function updateTokenSearchUi() {
        if (!tokenSearchInput) return;
        tokenSearchInput.value = tokenSearchQuery;
        if (tokenSearchClearBtn) {
          tokenSearchClearBtn.disabled = tokenSearchQuery.trim().length === 0;
        }
      }

      function clearTokenSearch() {
        tokenSearchQuery = "";
        if (tokenSearchInput) {
          tokenSearchInput.value = "";
        }
        if (tokenSearchClearBtn) {
          tokenSearchClearBtn.disabled = true;
        }
      }

      function postLayoutAction(action, extra = {}) {
        if (!currentSelectionIds.length && !currentNodeId) {
          console.log("No node selected");
          return;
        }

        markPendingApplyFeedback();

        parent.postMessage(
          {
            pluginMessage: {
              type: "apply-layout-action",
              nodeIds:
                currentSelectionIds.length > 0
                  ? currentSelectionIds
                  : [currentNodeId],
              action,
              ...extra,
            },
          },
          "*",
        );
      }

      /* Render token tree with nested colors/shades */
      function renderTokenTree() {
        tokenTree.innerHTML = "";

        const tokenSearch = document.querySelector(".token-search");
        const showTokenFilters =
          currentTokenCategory !== "layout" &&
          currentTokenCategory !== "gradients";

        // Show/hide spacing property selector based on category
        const spacingSelector = document.getElementById(
          "spacing-property-selector",
        );
        const spacingMultiTargetsRow = document.getElementById(
          "spacing-multi-targets-row",
        );
        const colorUtilityRow = document.getElementById(
          "color-utility-input-row",
        );
        const spacingUtilityRow = document.getElementById(
          "spacing-utility-input-row",
        );
        const typographySelector = document.getElementById(
          "typography-property-selector",
        );
        const typographyUtilityRow = document.getElementById(
          "typography-utility-input-row",
        );
        const typographyPropertySelect = document.getElementById(
          "typography-property-select",
        );

        if (colorUtilityRow) {
          colorUtilityRow.style.display =
            currentTokenCategory === "colors" ? "block" : "none";
        }

        if (spacingSelector) {
          spacingSelector.style.display =
            currentTokenCategory === "spacing" ? "block" : "none";
        }

        if (spacingMultiTargetsRow) {
          spacingMultiTargetsRow.style.display =
            currentTokenCategory === "spacing" ? "block" : "none";
        }

        if (spacingUtilityRow) {
          spacingUtilityRow.style.display =
            currentTokenCategory === "spacing" ? "block" : "none";
        }

        if (typographySelector) {
          typographySelector.style.display =
            currentTokenCategory === "typography" ? "block" : "none";
        }

        if (typographyUtilityRow) {
          typographyUtilityRow.style.display =
            currentTokenCategory === "typography" ? "block" : "none";
        }

        // Show/hide effects property selector based on category
        const effectsSelector = document.getElementById(
          "effects-property-selector",
        );
        if (effectsSelector) {
          effectsSelector.style.display =
            currentTokenCategory === "effects" ? "block" : "none";
        }

        const gradientSelector = document.getElementById("gradient-selector");
        if (gradientSelector) {
          gradientSelector.style.display =
            currentTokenCategory === "gradients" ? "block" : "none";
          gradientSelector.style.maxHeight =
            currentTokenCategory === "gradients" ? "none" : "280px";
          gradientSelector.style.overflowY =
            currentTokenCategory === "gradients" ? "visible" : "auto";
          gradientSelector.classList.toggle(
            "gradient-compact",
            currentTokenCategory === "gradients",
          );
        }

        if (layoutControls) {
          layoutControls.style.display =
            currentTokenCategory === "layout" ? "flex" : "none";
        }

        if (tokenSearch) {
          tokenSearch.style.display = showTokenFilters ? "block" : "none";
        }

        if (colorAlphaFilters) {
          colorAlphaFilters.style.display =
            showTokenFilters && currentTokenCategory === "colors"
              ? "flex"
              : "none";
        }

        if (colorUtilityRow) {
          colorUtilityRow.style.display =
            showTokenFilters && currentTokenCategory === "colors"
              ? "block"
              : "none";
        }

        if (spacingSelector) {
          spacingSelector.style.display =
            showTokenFilters && currentTokenCategory === "spacing"
              ? "block"
              : "none";
        }

        if (spacingMultiTargetsRow) {
          spacingMultiTargetsRow.style.display =
            showTokenFilters && currentTokenCategory === "spacing"
              ? "block"
              : "none";
        }

        if (spacingUtilityRow) {
          spacingUtilityRow.style.display =
            showTokenFilters && currentTokenCategory === "spacing"
              ? "block"
              : "none";
        }

        if (typographySelector) {
          typographySelector.style.display =
            showTokenFilters && currentTokenCategory === "typography"
              ? "block"
              : "none";
        }

        if (typographyUtilityRow) {
          typographyUtilityRow.style.display =
            showTokenFilters && currentTokenCategory === "typography"
              ? "block"
              : "none";
        }

        if (effectsSelector) {
          effectsSelector.style.display =
            showTokenFilters && currentTokenCategory === "effects"
              ? "block"
              : "none";
        }

        updateSpacingMultiTargetUi();

        if (currentTokenCategory === "layout") {
          if (tokenTree) tokenTree.style.display = "none";
          renderLayoutControls();
          requestAnimationFrame(refreshOpenCollapsibles);
          return;
        }

        if (tokenTree) {
          tokenTree.style.display =
            currentTokenCategory === "gradients" ? "none" : "block";
        }

        if (currentTokenCategory === "gradients") {
          const fromSelect = document.getElementById("gradient-from-select");
          const toSelect = document.getElementById("gradient-to-select");
          const extraStopsContainer = document.getElementById(
            "gradient-extra-stops",
          );
          const addStopBtn = document.getElementById("gradient-add-stop-btn");
          const customColorNameInput =
            document.getElementById("custom-color-name");
          const customColorValueInput =
            document.getElementById("custom-color-value");
          const saveCustomColorBtn = document.getElementById(
            "save-custom-color-btn",
          );
          const customGradientNameInput = document.getElementById(
            "custom-gradient-name",
          );
          const saveCustomGradientBtn = document.getElementById(
            "save-custom-gradient-btn",
          );
          const savedGradientSelect = document.getElementById(
            "saved-gradient-select",
          );
          const applySavedGradientBtn = document.getElementById(
            "apply-saved-gradient-btn",
          );

          const getAllGradientSelects = () => {
            const extraSelects = extraStopsContainer
              ? Array.from(
                  extraStopsContainer.querySelectorAll(
                    'select[data-gradient-stop="extra"]',
                  ),
                )
              : [];
            return [fromSelect, toSelect, ...extraSelects].filter(Boolean);
          };

          const populateColorOptions = (selectEl) => {
            if (!selectEl) return;
            selectEl.innerHTML = '<option value="">-- Select Color --</option>';
            const colors = TAILWIND_TOKENS.colors;
            Object.entries(colors).forEach(([colorName, shades]) => {
              if (
                shades &&
                typeof shades === "object" &&
                !isTokenLeaf(shades)
              ) {
                Object.entries(shades).forEach(([shade, hexToken]) => {
                  const hex = tokenValue(hexToken);
                  if (typeof hex !== "string") return;
                  const optionValue = `${colorName}-${shade}`;
                  if (!matchesTokenSearch(optionValue, colorName, shade, hex)) {
                    return;
                  }
                  const option = document.createElement("option");
                  option.value = optionValue;
                  option.textContent = optionValue;
                  option.style.backgroundColor = hex;
                  option.style.color = getReadableTextColor(hex);
                  selectEl.appendChild(option);
                });
              } else {
                const simpleColor = tokenValue(shades);
                if (typeof simpleColor !== "string") return;
                if (!matchesTokenSearch(colorName, simpleColor)) {
                  return;
                }
                const option = document.createElement("option");
                option.value = simpleColor;
                option.textContent = colorName;
                option.style.backgroundColor = simpleColor;
                option.style.color = getReadableTextColor(simpleColor);
                selectEl.appendChild(option);
              }
            });
          };

          const refreshGradientSelectOptions = () => {
            getAllGradientSelects().forEach((selectEl) => {
              const previousValue = selectEl.value;
              populateColorOptions(selectEl);
              if (
                previousValue &&
                Array.from(selectEl.options).some(
                  (option) => option.value === previousValue,
                )
              ) {
                selectEl.value = previousValue;
              }
            });
          };

          const createExtraGradientStopSelect = (initialValue = "") => {
            if (!extraStopsContainer) return;

            const row = document.createElement("div");
            row.className = "gradient-stop-row";

            const selectEl = document.createElement("select");
            selectEl.setAttribute("data-gradient-stop", "extra");
            selectEl.style.flex = "1";

            const removeBtn = document.createElement("button");
            removeBtn.type = "button";
            removeBtn.className = "button muted";
            removeBtn.textContent = "Remove";
            removeBtn.onclick = () => {
              row.remove();
            };

            row.appendChild(selectEl);
            row.appendChild(removeBtn);
            extraStopsContainer.appendChild(row);

            populateColorOptions(selectEl);
            if (
              initialValue &&
              Array.from(selectEl.options).some(
                (option) => option.value === initialValue,
              )
            ) {
              selectEl.value = initialValue;
            }
          };

          refreshGradientSelectOptions();

          if (addStopBtn) {
            addStopBtn.onclick = () => {
              createExtraGradientStopSelect();
            };
          }

          const applyBtn = document.getElementById("gradient-apply-btn");
          if (applyBtn) {
            applyBtn.onclick = () => {
              if (!currentNodeId) {
                console.log("No node selected");
                return;
              }
              const colors = getAllGradientSelects()
                .map((selectEl) => selectEl.value)
                .filter(Boolean);

              if (colors.length < 2) {
                console.log("Select at least two gradient colors");
                return;
              }

              parent.postMessage(
                {
                  pluginMessage: {
                    type: "apply-gradient-token",
                    nodeId: currentNodeId,
                    colors,
                  },
                },
                "*",
              );
            };
          }

          if (saveCustomColorBtn) {
            saveCustomColorBtn.onclick = () => {
              // This handler validates and saves a custom color token.
              const normalizedName = normalizeCustomTokenName(
                customColorNameInput?.value,
              );
              const hexColor = String(customColorValueInput?.value || "");

              if (!normalizedName) {
                console.log("Enter a custom color name");
                return;
              }
              if (!isValidHexColor(hexColor)) {
                console.log("Invalid color hex");
                return;
              }

              customColors[normalizedName] = hexColor.toLowerCase();
              saveCustomColorToken(normalizedName, hexColor.toLowerCase());
              if (customColorNameInput) customColorNameInput.value = "";
            };
          }

          if (saveCustomGradientBtn) {
            saveCustomGradientBtn.onclick = () => {
              // This handler validates and saves a custom gradient token.
              const normalizedName = normalizeCustomTokenName(
                customGradientNameInput?.value,
              );
              const colors = getAllGradientSelects()
                .map((selectEl) => selectEl.value)
                .filter(Boolean);
              const fromValue = colors[0] || "";
              const toValue = colors[colors.length - 1] || "";

              if (!normalizedName) {
                console.log("Enter a custom gradient name");
                return;
              }
              if (colors.length < 2 || !fromValue || !toValue) {
                console.log("Select at least two gradient colors");
                return;
              }

              customGradients[normalizedName] = {
                from: fromValue,
                to: toValue,
                stops: colors,
              };
              saveCustomGradientToken(
                normalizedName,
                fromValue,
                toValue,
                colors,
              );
              if (customGradientNameInput) customGradientNameInput.value = "";
            };
          }

          if (applySavedGradientBtn) {
            applySavedGradientBtn.onclick = () => {
              // This handler applies a saved gradient token to the selected node.
              if (!currentNodeId) {
                console.log("No node selected");
                return;
              }

              const selectedName = savedGradientSelect?.value || "";
              if (!selectedName || !customGradients[selectedName]) {
                console.log("Select a saved gradient");
                return;
              }

              const savedGradient = customGradients[selectedName];
              const savedStops = Array.isArray(savedGradient.stops)
                ? savedGradient.stops.filter(Boolean)
                : [];
              const colorsToApply =
                savedStops.length >= 2
                  ? savedStops
                  : [savedGradient.from, savedGradient.to].filter(Boolean);

              parent.postMessage(
                {
                  pluginMessage: {
                    type: "apply-gradient-token",
                    nodeId: currentNodeId,
                    colors: colorsToApply,
                  },
                },
                "*",
              );
            };
          }

          renderSavedGradientOptions();
        }

        const categoryTokens = TAILWIND_TOKENS[currentTokenCategory];
        if (!categoryTokens) return;

        const isColorCategory = currentTokenCategory === "colors";
        const isTypographyCategory = currentTokenCategory === "typography";
        const isEffectsCategory = currentTokenCategory === "effects";
        const isGradientCategory = currentTokenCategory === "gradients";

        if (colorAlphaFilters) {
          colorAlphaFilters.style.display = isColorCategory ? "flex" : "none";
          if (!isColorCategory) {
            currentColorLetterFilter = "ALL";
            colorAlphaFilters.innerHTML = "";
          }
        }

        if (isTokenLeaf(categoryTokens) || typeof categoryTokens !== "object") {
          const singleRow = document.createElement("div");
          singleRow.className = "token-shade";
          const label = document.createElement("div");
          label.className = "token-shade-label";
          label.textContent = currentTokenCategory;
          const value = document.createElement("div");
          value.className = "token-shade-value";
          value.textContent = String(
            tokenValue(categoryTokens) ?? categoryTokens,
          );
          singleRow.appendChild(label);
          singleRow.appendChild(value);
          tokenTree.appendChild(singleRow);
          return;
        }

        const flatTokens = [];

        const tokenEntries = Object.entries(categoryTokens);
        if (isColorCategory) {
          tokenEntries.sort(([a], [b]) => a.localeCompare(b));
          renderColorAlphaFilters(tokenEntries);
        }
        if (isTypographyCategory) {
          tokenEntries.sort(([a], [b]) => {
            if (a === "fontFamily" && b !== "fontFamily") return 1;
            if (b === "fontFamily" && a !== "fontFamily") return -1;
            return a.localeCompare(b);
          });
        }

        tokenEntries.forEach(([tokenName, tokenEntry]) => {
          if (isTypographyCategory) {
            const typographyGroupFilter =
              typographyPropertySelect?.value || "fontSize";
            if (
              typographyGroupFilter !== "all" &&
              tokenName !== typographyGroupFilter
            ) {
              return;
            }
          }

          if (
            isColorCategory &&
            currentColorLetterFilter !== "ALL" &&
            getLeadingAlpha(tokenName) !== currentColorLetterFilter
          ) {
            return;
          }

          if (
            tokenEntry &&
            typeof tokenEntry === "object" &&
            !isTokenLeaf(tokenEntry)
          ) {
            const group = document.createElement("div");
            group.className = "token-color-group";

            const colorNameEl = document.createElement("div");
            colorNameEl.className = "token-color-name";
            group.appendChild(colorNameEl);

            const shadesContainer = document.createElement("div");
            shadesContainer.className = "token-shades";
            let visibleShadeCount = 0;

            Object.entries(tokenEntry).forEach(([shade, shadeEntry]) => {
              const shadeValue = tokenValue(shadeEntry);
              if (shadeValue === null) return;
              if (!matchesTokenSearch(tokenName, shade, shadeValue)) {
                return;
              }
              const shadeEl = document.createElement("div");
              shadeEl.className = "token-shade";

              const label = document.createElement("div");
              label.className = "token-shade-label";
              label.textContent = shade;

              const valueEl = document.createElement("div");
              valueEl.className = "token-shade-value";
              if (isEffectsCategory && tokenName === "shadow") {
                valueEl.textContent = "preset";
                valueEl.title = String(shadeValue);
              } else {
                valueEl.textContent = String(shadeValue);
              }

              // Apply background color to the entire row for color tokens
              if (isColorCategory) {
                shadeEl.style.backgroundColor = String(shadeValue);
                // Set text color based on brightness for readability
                const textColor =
                  parseInt(shade) >= 500 ? "#ffffff" : "#000000";
                label.style.color = textColor;
                valueEl.style.color = textColor;
              }

              shadeEl.appendChild(label);
              shadeEl.appendChild(valueEl);

              if (isColorCategory) {
                shadeEl.addEventListener("click", () => {
                  if (!currentNodeId) {
                    console.log("No node selected");
                    return;
                  }

                  const colorProperty =
                    document.getElementById("color-property-select")?.value ||
                    "fill";

                  if (tokenName === "custom") {
                    parent.postMessage(
                      {
                        pluginMessage: {
                          type: "apply-custom-color",
                          nodeId: currentNodeId,
                          colorHex: String(shadeValue),
                          colorName: shade,
                          property: colorProperty,
                        },
                      },
                      "*",
                    );
                    return;
                  }

                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "apply-token",
                        nodeId: currentNodeId,
                        colorName: tokenName,
                        shade: shade,
                        property: colorProperty,
                      },
                    },
                    "*",
                  );
                });
              } else if (isTypographyCategory) {
                // Typography tokens: tokenName is the category (fontSize, fontFamily, etc.)
                shadeEl.addEventListener("click", () => {
                  if (!currentNodeId) {
                    console.log("No node selected");
                    return;
                  }

                  const payload = {
                    type: "apply-typography-token",
                    nodeId: currentNodeId,
                    category: tokenName,
                    tokenName: shade,
                  };

                  if (tokenName === "fontFamily") {
                    Object.assign(payload, { fontFamily: String(shadeValue) });
                  }

                  parent.postMessage(
                    {
                      pluginMessage: payload,
                    },
                    "*",
                  );
                });
              } else if (isEffectsCategory) {
                // Effects tokens: tokenName is the category (borderWidth, opacity, blur)
                shadeEl.addEventListener("click", () => {
                  if (!currentNodeId) {
                    console.log("No node selected");
                    return;
                  }

                  const payload = {
                    type: "apply-effects-token",
                    nodeId: currentNodeId,
                    category: tokenName,
                    tokenName: shade,
                  };

                  if (tokenName === "borderWidth") {
                    const strokePosition =
                      document.getElementById("stroke-position-select")
                        ?.value || "CENTER";
                    Object.assign(payload, { strokePosition });
                  } else if (tokenName === "blur") {
                    const blurType =
                      document.getElementById("blur-type-select")?.value ||
                      "LAYER_BLUR";
                    Object.assign(payload, { blurType });
                  }

                  parent.postMessage(
                    {
                      pluginMessage: payload,
                    },
                    "*",
                  );
                });
              }

              shadesContainer.appendChild(shadeEl);
              visibleShadeCount += 1;
            });

            if (visibleShadeCount === 0) {
              return;
            }

            const groupKey = `${currentTokenCategory}:${tokenName}`;
            const isCollapsed = collapsedTokenGroups[groupKey] === true;

            colorNameEl.textContent = `${isCollapsed ? "▸" : "▾"} ${tokenName} (${visibleShadeCount})`;
            colorNameEl.addEventListener("click", () => {
              collapsedTokenGroups[groupKey] = !collapsedTokenGroups[groupKey];
              renderTokenTree();
            });

            shadesContainer.style.display = isCollapsed ? "none" : "flex";

            group.appendChild(shadesContainer);
            tokenTree.appendChild(group);
          } else {
            const flatValue = tokenValue(tokenEntry);
            if (!matchesTokenSearch(tokenName, flatValue)) {
              return;
            }
            flatTokens.push({ name: tokenName, value: flatValue });
          }
        });

        if (flatTokens.length > 0) {
          const group = document.createElement("div");
          group.className = "token-color-group";

          const header = document.createElement("div");
          header.className = "token-color-name";
          header.textContent = currentTokenCategory;
          group.appendChild(header);

          const rows = document.createElement("div");
          rows.className = "token-shades";

          flatTokens.forEach((token) => {
            const row = document.createElement("div");
            row.className = "token-shade";

            if (isColorCategory) {
              const swatch = document.createElement("div");
              swatch.className = "token-swatch";
              if (typeof token.value === "string") {
                swatch.style.backgroundColor = token.value;
              }
              row.appendChild(swatch);
            }
            if (isGradientCategory) {
              const [, colorsPart] = String(token.value).split(":");
              const colors = colorsPart
                ? colorsPart.split(",").map((c) => c.trim())
                : [];
              if (colors.length >= 2) {
                row.style.background = `linear-gradient(90deg, ${colors.join(", ")})`;
                row.style.border = "1px solid rgba(0,0,0,0.08)";
                row.style.color = "#ffffff";
                row.style.textShadow = "0 1px 2px rgba(0,0,0,0.35)";
              }
            }

            const label = document.createElement("div");
            label.className = "token-shade-label";
            label.textContent = token.name;

            const value = document.createElement("div");
            value.className = "token-shade-value";
            value.textContent = String(token.value ?? "");

            row.appendChild(label);
            row.appendChild(value);

            if (isColorCategory) {
              row.addEventListener("click", () => {
                if (!currentNodeId) {
                  console.log("No node selected");
                  return;
                }

                parent.postMessage(
                  {
                    pluginMessage: {
                      type: "apply-token",
                      nodeId: currentNodeId,
                      colorName: token.name,
                      shade: "default",
                    },
                  },
                  "*",
                );
              });
            } else if (isGradientCategory) {
              row.addEventListener("click", () => {
                if (!currentNodeId) {
                  console.log("No node selected");
                  return;
                }

                parent.postMessage(
                  {
                    pluginMessage: {
                      type: "apply-gradient-token",
                      nodeId: currentNodeId,
                      tokenName: token.name,
                    },
                  },
                  "*",
                );
              });
            } else if (currentTokenCategory === "spacing") {
              row.addEventListener("click", () => {
                if (!currentNodeId) {
                  console.log("No node selected");
                  return;
                }

                // Get the selected property from the dropdown
                const selector = document.getElementById(
                  "spacing-property-select",
                );
                const property = selector ? selector.value : "padding";

                if (!property) return;

                applySpacingTokenWithProperty(token.name, property);
              });
            } else if (currentTokenCategory === "typography") {
              // For typography, token.name is the subcategory (fontSize, fontFamily, etc.)
            }

            rows.appendChild(row);
          });

          group.appendChild(rows);
          tokenTree.appendChild(group);
        }

        if (!tokenTree.hasChildNodes()) {
          const empty = document.createElement("div");
          empty.className = "property-value";
          empty.textContent = "No matching tokens";
          tokenTree.appendChild(empty);
        }

        requestAnimationFrame(refreshOpenCollapsibles);
      }

      function parseSpacingUtilityInput(rawValue) {
        const value = String(rawValue || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "");
        if (!value) return null;

        const spacingPropertySelect = document.getElementById(
          "spacing-property-select",
        );
        const fallbackProperty = spacingPropertySelect
          ? spacingPropertySelect.value
          : "padding";

        const utilityParsers = [
          { regex: /^gap-(.+)$/, property: "itemSpacing" },
          { regex: /^p-(.+)$/, property: "padding" },
          { regex: /^pt-(.+)$/, property: "paddingTop" },
          { regex: /^pr-(.+)$/, property: "paddingRight" },
          { regex: /^pb-(.+)$/, property: "paddingBottom" },
          { regex: /^pl-(.+)$/, property: "paddingLeft" },
          { regex: /^w-(.+)$/, property: "width" },
          { regex: /^h-(.+)$/, property: "height" },
          { regex: /^rounded-tl-(.+)$/, property: "topLeftRadius" },
          { regex: /^rounded-tr-(.+)$/, property: "topRightRadius" },
          { regex: /^rounded-br-(.+)$/, property: "bottomRightRadius" },
          { regex: /^rounded-bl-(.+)$/, property: "bottomLeftRadius" },
          { regex: /^rounded-(.+)$/, property: "cornerRadius" },
        ];

        let property = fallbackProperty;
        let tokenName = value;

        for (const parser of utilityParsers) {
          const match = value.match(parser.regex);
          if (match) {
            property = parser.property;
            tokenName = match[1];
            break;
          }
        }

        const spacingTokens = TAILWIND_TOKENS.spacing || {};
        if (!Object.prototype.hasOwnProperty.call(spacingTokens, tokenName)) {
          return null;
        }

        return { property, tokenName };
      }

      function resolveSpacingTargetProperties(baseProperty) {
        const property = String(baseProperty || "").trim();
        if (property === "paddingCustom") {
          return Array.from(
            document.querySelectorAll(
              'input[name="padding-multi-target"]:checked',
            ),
          ).map((input) => input.value);
        }

        if (property === "cornerRadiusCustom") {
          return Array.from(
            document.querySelectorAll(
              'input[name="corner-multi-target"]:checked',
            ),
          ).map((input) => input.value);
        }

        return property ? [property] : [];
      }

      function updateSpacingMultiTargetUi() {
        const spacingPropertySelect = document.getElementById(
          "spacing-property-select",
        );
        const spacingMultiTargetsRow = document.getElementById(
          "spacing-multi-targets-row",
        );
        const paddingMultiTargets = document.getElementById(
          "padding-multi-targets",
        );
        const cornerMultiTargets = document.getElementById(
          "corner-multi-targets",
        );

        if (
          !spacingPropertySelect ||
          !spacingMultiTargetsRow ||
          !paddingMultiTargets ||
          !cornerMultiTargets
        ) {
          return;
        }

        const mode = spacingPropertySelect.value;
        const isSpacingCategory = currentTokenCategory === "spacing";
        const showPadding = isSpacingCategory && mode === "paddingCustom";
        const showCorners = isSpacingCategory && mode === "cornerRadiusCustom";

        spacingMultiTargetsRow.style.display =
          showPadding || showCorners ? "block" : "none";
        paddingMultiTargets.style.display = showPadding ? "grid" : "none";
        cornerMultiTargets.style.display = showCorners ? "grid" : "none";
      }

      function applySpacingTokenWithProperty(tokenName, property) {
        if (!currentNodeId) {
          console.log("No node selected");
          return;
        }

        const targetProperties = resolveSpacingTargetProperties(property);
        if (targetProperties.length === 0) {
          if (property === "paddingCustom") {
            console.log("Select at least one padding side");
          } else if (property === "cornerRadiusCustom") {
            console.log("Select at least one corner radius target");
          }
          return;
        }

        targetProperties.forEach((targetProperty) => {
          parent.postMessage(
            {
              pluginMessage: {
                type: "apply-spacing-token",
                nodeId: currentNodeId,
                tokenName,
                property: targetProperty,
              },
            },
            "*",
          );
        });
      }

      function applyManualSpacingUtility() {
        const spacingUtilityInput = document.getElementById(
          "spacing-utility-input",
        );
        if (!spacingUtilityInput) return;

        if (!currentNodeId) {
          console.log("No node selected");
          return;
        }

        const parsed = parseSpacingUtilityInput(spacingUtilityInput.value);
        if (!parsed) {
          console.log(
            "Unknown spacing utility. Try gap-2, p-4, pt-2, w-64, rounded-2",
          );
          return;
        }

        markPendingApplyFeedback();
        applySpacingTokenWithProperty(parsed.tokenName, parsed.property);

        spacingUtilityInput.value = "";
      }

      function resolveColorTokenByUtilityToken(tokenText) {
        const normalizedToken = String(tokenText || "")
          .trim()
          .toLowerCase();
        if (!normalizedToken) return null;

        const colorTokens = TAILWIND_TOKENS.colors || {};
        for (const [colorName, shadeMap] of Object.entries(colorTokens)) {
          if (
            shadeMap &&
            typeof shadeMap === "object" &&
            !isTokenLeaf(shadeMap)
          ) {
            for (const shade of Object.keys(shadeMap)) {
              const combined = `${colorName}-${shade}`.toLowerCase();
              if (combined === normalizedToken) {
                return { colorName, shade };
              }
            }
          } else if (String(colorName).toLowerCase() === normalizedToken) {
            return { colorName, shade: "default" };
          }
        }

        return null;
      }

      function parseColorUtilityInput(rawValue) {
        const value = String(rawValue || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "");
        if (!value) return null;

        const colorPropertySelect = document.getElementById(
          "color-property-select",
        );
        let property =
          colorPropertySelect && colorPropertySelect.value === "stroke"
            ? "stroke"
            : "fill";

        let tokenText = value;
        if (value.startsWith("bg-")) {
          property = "fill";
          tokenText = value.slice(3);
        } else if (value.startsWith("text-")) {
          property = "fill";
          tokenText = value.slice(5);
        } else if (value.startsWith("border-")) {
          property = "stroke";
          tokenText = value.slice(7);
        }

        const resolved = resolveColorTokenByUtilityToken(tokenText);
        if (!resolved) return null;

        return {
          property,
          colorName: resolved.colorName,
          shade: resolved.shade,
        };
      }

      function applyManualColorUtility() {

        markPendingApplyFeedback();
        parent.postMessage(

      function parseTypographyUtilityInput(rawValue) {
        const value = String(rawValue || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "");
        if (!value) return null;

        const typography = TAILWIND_TOKENS.typography || {};
        const hasTypographyToken = (category, tokenName) =>
          Boolean(
            typography[category] &&
            Object.prototype.hasOwnProperty.call(
              typography[category],
              tokenName,
            ),
          );

        const mapped = [
          { prefix: "text-", category: "fontSize" },
          { prefix: "leading-", category: "lineHeight" },
          { prefix: "tracking-", category: "letterSpacing" },
        ];

        for (const item of mapped) {
          if (value.startsWith(item.prefix)) {
            const tokenName = value.slice(item.prefix.length);
            if (hasTypographyToken(item.category, tokenName)) {
              return { category: item.category, tokenName };
            }
          }
        }

        if (value.startsWith("font-")) {
          const tokenName = value.slice(5);
          if (hasTypographyToken("fontWeight", tokenName)) {
            return { category: "fontWeight", tokenName };
          }
          if (hasTypographyToken("fontFamily", tokenName)) {
            return { category: "fontFamily", tokenName };
          }
        }

        if (hasTypographyToken("fontSize", value)) {
          return { category: "fontSize", tokenName: value };
        }

        return null;
      }
