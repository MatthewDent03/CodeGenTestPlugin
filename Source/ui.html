<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Simple HTML Codegen</title>
    <style>
      * {
        box-sizing: border-box;
      }

      /* === Base Styles === */
      body {
        margin: 0;
        padding: 16px;
        background: #f4f6fb;
        color: #1f2937;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Arial;
      }

      /* === Panel Layout === */
      .panel {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .panel-title-group {
        display: flex;
        flex-direction: column;
      }

      .popout-btn {
        padding: 6px 10px;
        font-size: 12px;
      }

      /* === Typography === */
      .title {
        font-size: 18px;
        font-weight: 650;
        margin: 0 0 10px;
      }

      .subtitle {
        font-size: 12.5px;
        color: #6b7280;
        margin: 0 0 10px;
      }

      /* === Properties List === */
      .properties {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* === Individual property row with key-value pair === */
      .property-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #f9fafb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .property-key {
        min-width: 130px;
        color: #6b7280;
        font-size: 13px;
      }

      .property-value {
        font-size: 13px;
        word-break: break-word;
      }

      .property-input {
        width: 100%;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #1f2937;
        font-size: 13px;
      }

      .property-input:focus {
        outline: none;
        border-color: #2563eb;
      }

      .property-subgrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        width: 100%;
      }

      .property-subfield {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .property-subfield label {
        font-size: 11px;
        color: #6b7280;
      }

      /* === Tabs & Buttons === */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      /* === button styling === */
      .button {
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #1f2937;
        cursor: pointer;
        font-size: 13px;
        transition:
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .button:hover {
        background: #f3f4f6;
      }

      .button.active {
        border-color: #2563eb;
        color: #2563eb;
        background: rgba(37, 99, 235, 0.1);
      }

      .button.muted {
        color: #6b7280;
      }

      /* === Code Output Display === */
      pre {
        margin: 0;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        overflow: visible;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 20px;
        tab-size: 2;
        color: #1f2937;
      }

      /* === buttons container (Copy, Download) === */
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 12px;
      }

      /* === Color Swatches === */
      /* === Container for color chips === */
      .swatches {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      /* === Individual color swatch item === */
      .swatch {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 8px 10px;
        background: #f9fafb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .swatch-color {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #e5e7eb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }

      .swatch-labels {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .swatch-name {
        font-size: 12px;
        color: #6b7280;
      }

      .swatch-value {
        font-size: 12px;
        color: #1f2937;
      }

      /* === Child Fills === */
      .child-fills {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .child-fill-row {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 8px 10px;
        background: #f9fafb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .child-fill-name {
        min-width: 120px;
        font-size: 12px;
        color: #6b7280;
      }

      .child-fill-swatch {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid #e5e7eb;
        flex-shrink: 0;
      }

      /* === Collapsible (W3Schools) === */
      .collapsible {
        background-color: transparent;
        color: #1f2937;
        cursor: pointer;
        padding: 12px 14px;
        width: 100%;
        border: none;
        text-align: left;
        outline: none;
        font-size: 14px;
        font-weight: 600;
        transition: 0.4s;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 10px;
      }

      .active,
      .collapsible:hover {
        background-color: #f3f4f6;
      }

      .collapsible:after {
        content: "\002B";
        color: #6b7280;
        font-weight: bold;
        margin-left: auto;
      }

      .active:after {
        content: "\2212";
      }

      .content {
        padding: 0 14px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease-out;
        background-color: transparent;
      }

      .content.open {
        padding: 8px 14px 12px;
      }

      /* === Token Tabs and Tree === */
      .token-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        border-bottom: 1px solid #e5e7eb;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: thin;
        scrollbar-color: #d1d5db #f3f4f6;
      }

      .token-tabs::-webkit-scrollbar {
        height: 6px;
      }

      .token-tabs::-webkit-scrollbar-track {
        background: #f3f4f6;
      }

      .token-tabs::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 3px;
      }

      .token-tabs::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }

      .token-tab {
        padding: 8px 12px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        color: #6b7280;
        border-bottom: 2px solid transparent;
        transition: all 0.2s ease;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .token-tab.active {
        color: #1f2937;
        border-bottom-color: #3b82f6;
        font-weight: 600;
      }

      .token-tree {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 250px;
        overflow-y: auto;
      }

      .token-search {
        margin-bottom: 10px;
      }

      .token-search input {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: #1f2937;
        font-size: 12px;
      }

      .token-search input:focus {
        outline: none;
        border-color: #9ca3af;
      }

      .custom-token-controls {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #d1d5db;
        display: grid;
        gap: 6px;
      }

      .custom-token-row {
        display: flex;
        gap: 6px;
      }

      .custom-token-row input,
      .custom-token-row select {
        flex: 1;
        min-width: 0;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: #1f2937;
        font-size: 12px;
      }

      .custom-token-row input[type="color"] {
        flex: 0 0 40px;
        padding: 2px;
        cursor: pointer;
      }

      .token-color-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .token-color-name {
        font-size: 12px;
        font-weight: 600;
        color: #374151;
        padding: 4px 8px;
        background: #f3f4f6;
        border-radius: 6px;
        cursor: pointer;
      }

      .token-color-name:hover {
        background: #e5e7eb;
      }

      .token-shades {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-left: 8px;
      }

      .token-shade {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .token-shade:hover {
        background: #f3f4f6;
        border-color: #d1d5db;
      }

      .token-swatch {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: 1px solid #d1d5db;
        flex-shrink: 0;
      }

      .token-shade-label {
        font-size: 11px;
        color: #6b7280;
        flex-grow: 1;
      }

      /* === Spacing Property Selector === */
      .spacing-property-selector {
        margin-bottom: 12px;
        padding: 10px 12px;
        background: #f0f9ff;
        border: 1px solid #bae6fd;
        border-radius: 8px;
      }

      .spacing-property-selector label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #0369a1;
        margin-bottom: 6px;
      }

      .spacing-property-selector select {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #bae6fd;
        background: #ffffff;
        color: #1f2937;
        font-size: 12px;
        cursor: pointer;
      }

      .spacing-property-selector select:focus {
        outline: none;
        border-color: #0284c7;
      }

      /* === Effects Property Selector === */
      .effects-property-selector {
        margin-bottom: 12px;
        padding: 10px 12px;
        background: #f3f4f6;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        max-height: 280px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #9ca3af #e5e7eb;
      }

      .effects-property-selector::-webkit-scrollbar {
        width: 6px;
      }

      .effects-property-selector::-webkit-scrollbar-track {
        background: #e5e7eb;
      }

      .effects-property-selector::-webkit-scrollbar-thumb {
        background: #9ca3af;
        border-radius: 3px;
      }

      .effects-property-selector::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }

      .effects-property-selector label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 6px;
      }

      .effects-property-selector select {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: #1f2937;
        font-size: 12px;
        cursor: pointer;
        margin-bottom: 6px;
      }

      /* Style for stroke color select to better display color swatches */
      #stroke-color-select {
        padding: 8px;
        line-height: 1.6;
      }

      #stroke-color-select option {
        padding: 6px;
        line-height: 1.6;
      }

      .effects-property-selector select:focus {
        outline: none;
        border-color: #6b7280;
      }

      .token-shade-value {
        font-size: 11px;
        color: #1f2937;
        font-family: monospace;
        font-weight: 600;
        max-width: 170px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .gradient-stop-row {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-top: 6px;
      }

      .gradient-stop-row button {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title-group">
          <p class="title">Simple HTML Codegen</p>
          <p class="subtitle">Selected Frame</p>
        </div>
        <button class="button popout-btn" id="popout-btn">Pop out</button>
      </div>
      <div id="frame-name">No selection</div>
    </div>

    <div class="panel">
      <button type="button" class="collapsible">Editable Fields</button>
      <div class="content">
        <div id="properties" class="properties" aria-live="polite"></div>
        <div class="subtitle" style="margin-top: 14px">Child Fills</div>
        <div id="child-fills" class="child-fills" aria-live="polite"></div>
      </div>
    </div>

    <div class="panel">
      <button type="button" class="collapsible">Color Swatches</button>
      <div class="content">
        <div id="color-swatches" class="swatches" aria-live="polite"></div>
      </div>
    </div>

    <div class="panel">
      <button type="button" class="collapsible">Tailwind Color Tokens</button>
      <div class="content">
        <div class="token-tabs" id="token-tabs"></div>
        <div class="token-search">
          <input
            id="token-search-input"
            type="text"
            placeholder="Search tokens..."
          />
        </div>
        <div
          class="spacing-property-selector"
          id="spacing-property-selector"
          style="display: none"
        >
          <label for="spacing-property-select">Apply spacing token to:</label>
          <select id="spacing-property-select">
            <option value="padding">Padding (All Sides)</option>
            <option value="paddingTop">Padding Top</option>
            <option value="paddingRight">Padding Right</option>
            <option value="paddingBottom">Padding Bottom</option>
            <option value="paddingLeft">Padding Left</option>
            <option value="itemSpacing">Gap (Item Spacing)</option>
            <option value="width">Width</option>
            <option value="height">Height</option>
            <option value="cornerRadius">Corner Radius (All Corners)</option>
            <option value="topLeftRadius">Top Left Radius</option>
            <option value="topRightRadius">Top Right Radius</option>
            <option value="bottomRightRadius">Bottom Right Radius</option>
            <option value="bottomLeftRadius">Bottom Left Radius</option>
          </select>
        </div>
        <div
          class="color-property-selector"
          id="color-property-selector"
          style="
            display: none;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: #dbeafe;
            border: 1px solid #60a5fa;
            border-radius: 8px;
          "
        >
          <label
            for="color-property-select"
            style="
              display: block;
              font-size: 12px;
              font-weight: 600;
              color: #1e3a8a;
              margin-bottom: 6px;
            "
            >Apply color token to:</label
          >
          <select
            id="color-property-select"
            style="
              width: 100%;
              padding: 6px 8px;
              border-radius: 6px;
              border: 1px solid #60a5fa;
              background: #ffffff;
              color: #1f2937;
              font-size: 12px;
              cursor: pointer;
            "
          >
            <option value="fill">Fill</option>
            <option value="stroke">Stroke</option>
          </select>
        </div>
        <div
          class="effects-property-selector"
          id="effects-property-selector"
          style="display: none"
        >
          <label for="stroke-position-select">Stroke Position:</label>
          <select id="stroke-position-select">
            <option value="CENTER">Center</option>
            <option value="INSIDE">Inside</option>
            <option value="OUTSIDE">Outside</option>
          </select>

          <label for="blur-type-select">Blur Type:</label>
          <select id="blur-type-select">
            <option value="LAYER_BLUR">Layer Blur</option>
            <option value="BACKGROUND_BLUR">Background Blur</option>
          </select>
        </div>
        <div
          class="effects-property-selector"
          id="gradient-selector"
          style="display: none"
        >
          <label for="gradient-from-select">Gradient From:</label>
          <select id="gradient-from-select">
            <option value="">-- Select Color --</option>
          </select>

          <label
            for="gradient-to-select"
            style="margin-top: 6px; display: block"
            >Gradient To:</label
          >
          <select id="gradient-to-select">
            <option value="">-- Select Color --</option>
          </select>

          <div id="gradient-extra-stops"></div>

          <button
            type="button"
            id="gradient-add-stop-btn"
            class="button muted"
            style="margin-top: 6px; width: 100%"
          >
            + Add Another Color Stop
          </button>

          <button
            type="button"
            id="gradient-apply-btn"
            class="button"
            style="margin-top: 8px; width: 100%"
          >
            Apply Gradient
          </button>

          <div class="custom-token-controls">
            <div class="custom-token-row">
              <input
                id="custom-color-name"
                type="text"
                placeholder="Custom color name"
              />
              <input id="custom-color-value" type="color" value="#3b82f6" />
              <button type="button" id="save-custom-color-btn" class="button">
                Save Color
              </button>
            </div>

            <div class="custom-token-row">
              <input
                id="custom-gradient-name"
                type="text"
                placeholder="Custom gradient name"
              />
              <button
                type="button"
                id="save-custom-gradient-btn"
                class="button"
              >
                Save Gradient
              </button>
            </div>

            <div class="custom-token-row">
              <select id="saved-gradient-select">
                <option value="">-- Saved Gradients --</option>
              </select>
              <button
                type="button"
                id="apply-saved-gradient-btn"
                class="button"
              >
                Apply Saved
              </button>
            </div>
          </div>
        </div>
        <div class="token-tree" id="token-tree"></div>
      </div>
    </div>

    <div class="panel">
      <button type="button" class="collapsible">Live Code Preview</button>
      <div class="content">
        <div class="tabs">
          <button class="button active" id="tab-html">HTML + CSS</button>
          <button class="button" id="tab-tailwind">HTML + Tailwind</button>
          <button class="button" id="tab-react-tailwind">
            React + Tailwind
          </button>
        </div>
        <pre id="code-output" aria-live="polite"></pre>
        <div class="actions">
          <button class="button" id="copy-btn">Copy</button>
          <button class="button muted" id="download-btn">Download</button>
        </div>
      </div>
    </div>

    <script>
      /* === DOM Elements === */
      const frameName = document.getElementById("frame-name");
      const properties = document.getElementById("properties");
      const colorSwatches = document.getElementById("color-swatches");
      const childFills = document.getElementById("child-fills");
      const tokenTabs = document.getElementById("token-tabs");
      const tokenSearchInput = document.getElementById("token-search-input");
      const tokenTree = document.getElementById("token-tree");
      const codeOutput = document.getElementById("code-output");
      const tabHtml = document.getElementById("tab-html");
      const tabTailwind = document.getElementById("tab-tailwind");
      const tabReactTailwind = document.getElementById("tab-react-tailwind");
      const copyButton = document.getElementById("copy-btn");
      const downloadButton = document.getElementById("download-btn");
      const popoutButton = document.getElementById("popout-btn");

      /* === App State === */
      /* Tracks current mode (html/tailwind/react-tailwind) and generated code */
      const appState = {
        mode: "html",
        html: "",
        tailwind: "",
        reactTailwind: "",
      };

      let isPoppedOut = false;
      let currentNodeId = null;
      let tokenSearchQuery = "";
      let customColors = {};
      let customGradients = {};
      let availableFontFamilies = [];

      const editableConfig = {
        x: { type: "number" },
        y: { type: "number" },
        width: { type: "number" },
        height: { type: "number" },
        rotation: { type: "number" },
        opacity: { type: "number", min: 0, max: 1, step: 0.01 },
        cornerRadius: {
          type: "number",
          getValue: (value) =>
            value && typeof value.all === "number" ? value.all : null,
          allowMixed: true,
        },
        padding: {
          type: "number",
          getValue: (value) => {
            if (typeof value === "number") return value;
            if (!value || typeof value !== "object") return null;
            const { top = 0, right = 0, bottom = 0, left = 0 } = value;
            return top === right && right === bottom && bottom === left
              ? top
              : null;
          },
          allowMixed: true,
        },
        itemSpacing: { type: "number" },
        layoutGrow: { type: "number" },
        fontSize: { type: "number" },
        characters: { type: "text" },
        name: { type: "text" },
        fill: { type: "text" },
        stroke: {
          type: "text",
          getValue: (value) => (value && value.color ? value.color : ""),
        },
        strokeWeight: { type: "number" },
        strokeAlign: { type: "text" },
        layoutAlign: { type: "text" },
      };

      /* === Property Order === */
      /* Defines preferred order for displaying properties  */
      const propertyOrder = [
        "id",
        "name",
        "type",
        "width",
        "height",
        "x",
        "y",
        "rotation",
        "layoutMode",
        "itemSpacing",
        "gap",
        "padding",
        "cornerRadius",
        "fill",
        "stroke",
        "strokeWeight",
        "strokeAlign",
        "layoutGrow",
        "layoutAlign",
        "fontSize",
        "fontName",
        "characters",
        "textAlignHorizontal",
        "fills",
        "strokes",
      ];

      const propertyLabels = {
        itemSpacing: "Gap",
      };

      /* === Utility Functions === */
      /* Convert any value to displayable string, handling objects and nulls */
      function toDisplayValue(value) {
        if (value === undefined || value === null) return "—";
        if (typeof value === "string" || typeof value === "number") {
          return String(value);
        }
        return JSON.stringify(value);
      }

      /* Return the current code based on selected mode */
      function getCodeForMode() {
        if (appState.mode === "html") return appState.html;
        if (appState.mode === "tailwind") return appState.tailwind;
        return appState.reactTailwind;
      }

      /* === Tailwind Token Registry (raw values) === */
      const RAW_TAILWIND_TOKENS = {
        colors: {
          slate: {

      function inferTokenType(path) {
        const [category, subcategory] = path;
        if (category === "colors") return "color";
        if (category === "spacing") return "dimension";
        if (category === "typography") {
          if (subcategory === "fontFamily") return "fontFamily";
          if (subcategory === "fontWeight") return "fontWeight";
          if (subcategory === "lineHeight") return "number";
          return "dimension";
        }
        if (category === "effects") {
          if (subcategory === "opacity") return "number";
          if (subcategory === "shadow") return "shadow";
          return "dimension";
        }
        if (category === "gradients") return "gradient";
        return "string";
      }

      // Converts raw Tailwind token objects into W3C Design Token format
      // Wraps string values with $value, $type, and $description metadata
      function toW3CTokens(node, path = []) {
        if (node && typeof node === "object" && !Array.isArray(node)) {
          // Skip nodes that are already in W3C format
          if ("$value" in node) return node;
          // Recursively process object properties
          const next = {};
          Object.entries(node).forEach(([key, value]) => {
            next[key] = toW3CTokens(value, [...path, key]);
          });
          return next;
        }

        if (typeof node === "string") {
          // Wrap primitive string values in W3C format with inferred type and path-based description
          return {
            $value: node,
            $type: inferTokenType(path),
            $description: path.join("."),
          };
        }

        return node;
      }

      // Checks if a token value is in W3C format with a $value property
      function isTokenLeaf(value) {
        return !!value && typeof value === "object" && "$value" in value;
      }

      // Extracts the actual value from a token, handling both W3C-wrapped and raw string formats
      function tokenValue(value) {
        if (value == null) return null;
        if (typeof value === "string") return value;
        if (isTokenLeaf(value)) return value.$value;
        return null;
      }

      // Converts all raw Tailwind tokens to W3C Design Token Format 2025.10
      const TAILWIND_TOKENS = toW3CTokens(RAW_TAILWIND_TOKENS);

      // This function normalizes custom token names for safe keys.
      function normalizeCustomTokenName(name) {
        return String(name || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      // This function validates full 6-digit hex color values.
      function isValidHexColor(hex) {
        return /^#([a-f0-9]{6})$/i.test(String(hex || ""));
      }

      // This function injects custom color and gradient tokens into the active token registry.
      function applyCustomTokensToRegistry() {
        const baseFontFamilyTokens = {
          sans: "ui-sans-serif, system-ui, sans-serif",
          serif: "ui-serif, Georgia, serif",
          mono: "ui-monospace, monospace",
        };
        const dynamicFontFamilyTokens = {};
        availableFontFamilies.forEach((family) => {
          const normalizedKey = normalizeCustomTokenName(family);
          if (!normalizedKey || baseFontFamilyTokens[normalizedKey]) return;
          dynamicFontFamilyTokens[normalizedKey] = {
            $value: String(family),
            $type: "fontFamily",
            $description: `figma.fonts.${normalizedKey}`,
          };
        });

        TAILWIND_TOKENS.typography.fontFamily = {
          ...Object.fromEntries(
            Object.entries(baseFontFamilyTokens).map(([key, value]) => [
              key,
              {
                $value: value,
                $type: "fontFamily",
                $description: `typography.fontFamily.${key}`,
              },
            ]),
          ),
          ...dynamicFontFamilyTokens,
        };

        const colorGroup = {};
        Object.entries(customColors).forEach(([name, hex]) => {
          if (isValidHexColor(hex)) {
            colorGroup[name] = {
              $value: String(hex).toLowerCase(),
              $type: "color",
              $description: `custom.colors.${name}`,
            };
          }
        });

        if (Object.keys(colorGroup).length > 0) {
          TAILWIND_TOKENS.colors.custom = colorGroup;
        } else {
          delete TAILWIND_TOKENS.colors.custom;
        }

        const gradients = {};
        Object.entries(customGradients).forEach(([name, gradient]) => {
          const stops = Array.isArray(gradient?.stops)
            ? gradient.stops.filter(Boolean)
            : [];
          const fallbackStops = [gradient?.from, gradient?.to].filter(Boolean);
          const gradientStops = stops.length >= 2 ? stops : fallbackStops;
          if (gradientStops.length >= 2) {
            gradients[name] = {
              $value: `linear:${gradientStops.join(",")}`,
              $type: "gradient",
              $description: `custom.gradients.${name}`,
            };
          }
        });

        TAILWIND_TOKENS.gradients = gradients;
      }

      // This function requests persisted custom tokens from plugin storage.
      function requestCustomTokensFromPlugin() {
        parent.postMessage(
          {
            pluginMessage: {
              type: "request-custom-tokens",
            },
          },
          "*",
        );
      }

      // This function sends a custom color token save request to plugin code.
      function saveCustomColorToken(name, hex) {
        parent.postMessage(
          {
            pluginMessage: {
              type: "save-custom-color-token",
              name,
              hex,
            },
          },
          "*",
        );
      }

      // This function sends a custom gradient token save request to plugin code.
      function saveCustomGradientToken(name, from, to, stops) {
        parent.postMessage(
          {
            pluginMessage: {
              type: "save-custom-gradient-token",
              name,
              from,
              to,
              stops,
            },
          },
          "*",
        );
      }

      // This function rebuilds the saved gradients dropdown from current custom state.
      function renderSavedGradientOptions() {
        const savedGradientSelect = document.getElementById(
          "saved-gradient-select",
        );
        if (!savedGradientSelect) return;

        savedGradientSelect.innerHTML =
          '<option value="">-- Saved Gradients --</option>';
        Object.keys(customGradients)
          .sort()
          .forEach((name) => {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            savedGradientSelect.appendChild(option);
          });
      }

      requestCustomTokensFromPlugin();

      // Determines if token parts match the current search query
      // Checks if any part (name, shade, value) contains the query substring (case-insensitive)
      function matchesTokenSearch(...parts) {
        const query = tokenSearchQuery.trim().toLowerCase();
        if (!query) return true;
        return parts.some((part) =>
          String(part ?? "")
            .toLowerCase()
            .includes(query),
        );
      }

      let currentTokenCategory = "colors";
      const collapsedTokenGroups = {};

      /* Render token tabs for each category */
      function renderTokenTabs() {
        tokenTabs.innerHTML = "";
        Object.keys(TAILWIND_TOKENS).forEach((category) => {
          const btn = document.createElement("button");
          btn.className = `token-tab ${category === currentTokenCategory ? "active" : ""}`;
          btn.textContent =
            category.charAt(0).toUpperCase() + category.slice(1);
          btn.addEventListener("click", () => {
            currentTokenCategory = category;
            renderTokenTabs();
            renderTokenTree();
          });
          tokenTabs.appendChild(btn);
        });
      }

      /* Render token tree with nested colors/shades */
      function renderTokenTree() {
        tokenTree.innerHTML = "";

        // Show/hide spacing property selector based on category
        const spacingSelector = document.getElementById(
          "spacing-property-selector",
        );
        if (spacingSelector) {
          spacingSelector.style.display =
            currentTokenCategory === "spacing" ? "block" : "none";
        }

        // Show/hide effects property selector based on category
        const effectsSelector = document.getElementById(
          "effects-property-selector",
        );
        if (effectsSelector) {
          effectsSelector.style.display =
            currentTokenCategory === "effects" ? "block" : "none";
        }

        const gradientSelector = document.getElementById("gradient-selector");
        if (gradientSelector) {
          gradientSelector.style.display =
            currentTokenCategory === "gradients" ? "block" : "none";
        }

        if (tokenTree) {
          tokenTree.style.display =
            currentTokenCategory === "gradients" ? "none" : "block";
        }

        if (currentTokenCategory === "gradients") {
          const fromSelect = document.getElementById("gradient-from-select");
          const toSelect = document.getElementById("gradient-to-select");
          const extraStopsContainer = document.getElementById(
            "gradient-extra-stops",
          );
          const addStopBtn = document.getElementById("gradient-add-stop-btn");
          const customColorNameInput =
            document.getElementById("custom-color-name");
          const customColorValueInput =
            document.getElementById("custom-color-value");
          const saveCustomColorBtn = document.getElementById(
            "save-custom-color-btn",
          );
          const customGradientNameInput = document.getElementById(
            "custom-gradient-name",
          );
          const saveCustomGradientBtn = document.getElementById(
            "save-custom-gradient-btn",
          );
          const savedGradientSelect = document.getElementById(
            "saved-gradient-select",
          );
          const applySavedGradientBtn = document.getElementById(
            "apply-saved-gradient-btn",
          );

          const getAllGradientSelects = () => {
            const extraSelects = extraStopsContainer
              ? Array.from(
                  extraStopsContainer.querySelectorAll(
                    'select[data-gradient-stop="extra"]',
                  ),
                )
              : [];
            return [fromSelect, toSelect, ...extraSelects].filter(Boolean);
          };

          const populateColorOptions = (selectEl) => {
            if (!selectEl) return;
            selectEl.innerHTML = '<option value="">-- Select Color --</option>';
            const colors = TAILWIND_TOKENS.colors;
            Object.entries(colors).forEach(([colorName, shades]) => {
              if (
                shades &&
                typeof shades === "object" &&
                !isTokenLeaf(shades)
              ) {
                Object.entries(shades).forEach(([shade, hexToken]) => {
                  const hex = tokenValue(hexToken);
                  if (typeof hex !== "string") return;
                  const optionValue = `${colorName}-${shade}`;
                  if (!matchesTokenSearch(optionValue, colorName, shade, hex)) {
                    return;
                  }
                  const option = document.createElement("option");
                  option.value = optionValue;
                  option.textContent = optionValue;
                  option.style.backgroundColor = hex;
                  option.style.color = getReadableTextColor(hex);
                  selectEl.appendChild(option);
                });
              } else {
                const simpleColor = tokenValue(shades);
                if (typeof simpleColor !== "string") return;
                if (!matchesTokenSearch(colorName, simpleColor)) {
                  return;
                }
                const option = document.createElement("option");
                option.value = simpleColor;
                option.textContent = colorName;
                option.style.backgroundColor = simpleColor;
                option.style.color = getReadableTextColor(simpleColor);
                selectEl.appendChild(option);
              }
            });
          };

          const refreshGradientSelectOptions = () => {
            getAllGradientSelects().forEach((selectEl) => {
              const previousValue = selectEl.value;
              populateColorOptions(selectEl);
              if (
                previousValue &&
                Array.from(selectEl.options).some(
                  (option) => option.value === previousValue,
                )
              ) {
                selectEl.value = previousValue;
              }
            });
          };

          const createExtraGradientStopSelect = (initialValue = "") => {
            if (!extraStopsContainer) return;

            const row = document.createElement("div");
            row.className = "gradient-stop-row";

            const selectEl = document.createElement("select");
            selectEl.setAttribute("data-gradient-stop", "extra");
            selectEl.style.flex = "1";

            const removeBtn = document.createElement("button");
            removeBtn.type = "button";
            removeBtn.className = "button muted";
            removeBtn.textContent = "Remove";
            removeBtn.onclick = () => {
              row.remove();
            };

            row.appendChild(selectEl);
            row.appendChild(removeBtn);
            extraStopsContainer.appendChild(row);

            populateColorOptions(selectEl);
            if (
              initialValue &&
              Array.from(selectEl.options).some(
                (option) => option.value === initialValue,
              )
            ) {
              selectEl.value = initialValue;
            }
          };

          refreshGradientSelectOptions();

          if (addStopBtn) {
            addStopBtn.onclick = () => {
              createExtraGradientStopSelect();
            };
          }

          const applyBtn = document.getElementById("gradient-apply-btn");
          if (applyBtn) {
            applyBtn.onclick = () => {
              if (!currentNodeId) {
                console.log("No node selected");
                return;
              }
              const colors = getAllGradientSelects()
                .map((selectEl) => selectEl.value)
                .filter(Boolean);

              if (colors.length < 2) {
                console.log("Select at least two gradient colors");
                return;
              }

              parent.postMessage(
                {
                  pluginMessage: {
                    type: "apply-gradient-token",
                    nodeId: currentNodeId,
                    colors,
                  },
                },
                "*",
              );
            };
          }

          if (saveCustomColorBtn) {
            saveCustomColorBtn.onclick = () => {
              // This handler validates and saves a custom color token.
              const normalizedName = normalizeCustomTokenName(
                customColorNameInput?.value,
              );
              const hexColor = String(customColorValueInput?.value || "");

              if (!normalizedName) {
                console.log("Enter a custom color name");
                return;
              }
              if (!isValidHexColor(hexColor)) {
                console.log("Invalid color hex");
                return;
              }

              customColors[normalizedName] = hexColor.toLowerCase();
              saveCustomColorToken(normalizedName, hexColor.toLowerCase());
              if (customColorNameInput) customColorNameInput.value = "";
            };
          }

          if (saveCustomGradientBtn) {
            saveCustomGradientBtn.onclick = () => {
              // This handler validates and saves a custom gradient token.
              const normalizedName = normalizeCustomTokenName(
                customGradientNameInput?.value,
              );
              const colors = getAllGradientSelects()
                .map((selectEl) => selectEl.value)
                .filter(Boolean);
              const fromValue = colors[0] || "";
              const toValue = colors[colors.length - 1] || "";

              if (!normalizedName) {
                console.log("Enter a custom gradient name");
                return;
              }
              if (colors.length < 2 || !fromValue || !toValue) {
                console.log("Select at least two gradient colors");
                return;
              }

              customGradients[normalizedName] = {
                from: fromValue,
                to: toValue,
                stops: colors,
              };
              saveCustomGradientToken(
                normalizedName,
                fromValue,
                toValue,
                colors,
              );
              if (customGradientNameInput) customGradientNameInput.value = "";
            };
          }

          if (applySavedGradientBtn) {
            applySavedGradientBtn.onclick = () => {
              // This handler applies a saved gradient token to the selected node.
              if (!currentNodeId) {
                console.log("No node selected");
                return;
              }

              const selectedName = savedGradientSelect?.value || "";
              if (!selectedName || !customGradients[selectedName]) {
                console.log("Select a saved gradient");
                return;
              }

              const savedGradient = customGradients[selectedName];
              const savedStops = Array.isArray(savedGradient.stops)
                ? savedGradient.stops.filter(Boolean)
                : [];
              const colorsToApply =
                savedStops.length >= 2
                  ? savedStops
                  : [savedGradient.from, savedGradient.to].filter(Boolean);

              parent.postMessage(
                {
                  pluginMessage: {
                    type: "apply-gradient-token",
                    nodeId: currentNodeId,
                    colors: colorsToApply,
                  },
                },
                "*",
              );
            };
          }

          renderSavedGradientOptions();
        }

        const categoryTokens = TAILWIND_TOKENS[currentTokenCategory];
        if (!categoryTokens) return;

        const isColorCategory = currentTokenCategory === "colors";
        const isTypographyCategory = currentTokenCategory === "typography";
        const isEffectsCategory = currentTokenCategory === "effects";
        const isGradientCategory = currentTokenCategory === "gradients";

        if (isTokenLeaf(categoryTokens) || typeof categoryTokens !== "object") {
          const singleRow = document.createElement("div");
          singleRow.className = "token-shade";
          const label = document.createElement("div");
          label.className = "token-shade-label";
          label.textContent = currentTokenCategory;
          const value = document.createElement("div");
          value.className = "token-shade-value";
          value.textContent = String(
            tokenValue(categoryTokens) ?? categoryTokens,
          );
          singleRow.appendChild(label);
          singleRow.appendChild(value);
          tokenTree.appendChild(singleRow);
          return;
        }

        const flatTokens = [];

        Object.entries(categoryTokens).forEach(([tokenName, tokenEntry]) => {
          if (
            tokenEntry &&
            typeof tokenEntry === "object" &&
            !isTokenLeaf(tokenEntry)
          ) {
            const group = document.createElement("div");
            group.className = "token-color-group";

            const colorNameEl = document.createElement("div");
            colorNameEl.className = "token-color-name";
            group.appendChild(colorNameEl);

            const shadesContainer = document.createElement("div");
            shadesContainer.className = "token-shades";
            let visibleShadeCount = 0;

            Object.entries(tokenEntry).forEach(([shade, shadeEntry]) => {
              const shadeValue = tokenValue(shadeEntry);
              if (shadeValue === null) return;
              if (!matchesTokenSearch(tokenName, shade, shadeValue)) {
                return;
              }
              const shadeEl = document.createElement("div");
              shadeEl.className = "token-shade";

              const label = document.createElement("div");
              label.className = "token-shade-label";
              label.textContent = shade;

              const valueEl = document.createElement("div");
              valueEl.className = "token-shade-value";
              if (isEffectsCategory && tokenName === "shadow") {
                valueEl.textContent = "preset";
                valueEl.title = String(shadeValue);
              } else {
                valueEl.textContent = String(shadeValue);
              }

              // Apply background color to the entire row for color tokens
              if (isColorCategory) {
                shadeEl.style.backgroundColor = String(shadeValue);
                // Set text color based on brightness for readability
                const textColor =
                  parseInt(shade) >= 500 ? "#ffffff" : "#000000";
                label.style.color = textColor;
                valueEl.style.color = textColor;
              }

              shadeEl.appendChild(label);
              shadeEl.appendChild(valueEl);

              if (isColorCategory) {
                shadeEl.addEventListener("click", () => {
                  if (!currentNodeId) {
                    console.log("No node selected");
                    return;
                  }

                  const colorProperty =
                    document.getElementById("color-property-select")?.value ||
                    "fill";

                  if (tokenName === "custom") {
                    parent.postMessage(
                      {
                        pluginMessage: {
                          type: "apply-custom-color",
                          nodeId: currentNodeId,
                          colorHex: String(shadeValue),
                          colorName: shade,
                          property: colorProperty,
                        },
                      },
                      "*",
                    );
                    return;
                  }

                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "apply-token",
                        nodeId: currentNodeId,
                        colorName: tokenName,
                        shade: shade,
                        property: colorProperty,
                      },
                    },
                    "*",
                  );
                });
              } else if (isTypographyCategory) {
                // Typography tokens: tokenName is the category (fontSize, fontFamily, etc.)
                shadeEl.addEventListener("click", () => {
                  if (!currentNodeId) {
                    console.log("No node selected");
                    return;
                  }

                  const payload = {
                    type: "apply-typography-token",
                    nodeId: currentNodeId,
                    category: tokenName,
                    tokenName: shade,
                  };

                  if (tokenName === "fontFamily") {
                    Object.assign(payload, { fontFamily: String(shadeValue) });
                  }

                  parent.postMessage(
                    {
                      pluginMessage: payload,
                    },
                    "*",
                  );
                });
              } else if (isEffectsCategory) {
                // Effects tokens: tokenName is the category (borderWidth, opacity, blur)
                shadeEl.addEventListener("click", () => {
                  if (!currentNodeId) {
                    console.log("No node selected");
                    return;
                  }

                  const payload = {
                    type: "apply-effects-token",
                    nodeId: currentNodeId,
                    category: tokenName,
                    tokenName: shade,
                  };

                  if (tokenName === "borderWidth") {
                    const strokePosition =
                      document.getElementById("stroke-position-select")
                        ?.value || "CENTER";
                    Object.assign(payload, { strokePosition });
                  } else if (tokenName === "blur") {
                    const blurType =
                      document.getElementById("blur-type-select")?.value ||
                      "LAYER_BLUR";
                    Object.assign(payload, { blurType });
                  }

                  parent.postMessage(
                    {
                      pluginMessage: payload,
                    },
                    "*",
                  );
                });
              }

              shadesContainer.appendChild(shadeEl);
              visibleShadeCount += 1;
            });

            if (visibleShadeCount === 0) {
              return;
            }

            const groupKey = `${currentTokenCategory}:${tokenName}`;
            const isSearchActive = tokenSearchQuery.trim().length > 0;
            const isCollapsed =
              !isSearchActive && collapsedTokenGroups[groupKey] === true;

            colorNameEl.textContent = `${isCollapsed ? "▸" : "▾"} ${tokenName} (${visibleShadeCount})`;
            colorNameEl.addEventListener("click", () => {
              collapsedTokenGroups[groupKey] = !collapsedTokenGroups[groupKey];
              renderTokenTree();
            });

            shadesContainer.style.display = isCollapsed ? "none" : "flex";

            group.appendChild(shadesContainer);
            tokenTree.appendChild(group);
          } else {
            const flatValue = tokenValue(tokenEntry);
            if (!matchesTokenSearch(tokenName, flatValue)) {
              return;
            }
            flatTokens.push({ name: tokenName, value: flatValue });
          }
        });

        if (flatTokens.length > 0) {
          const group = document.createElement("div");
          group.className = "token-color-group";

          const header = document.createElement("div");
          header.className = "token-color-name";
          header.textContent = currentTokenCategory;
          group.appendChild(header);

          const rows = document.createElement("div");
          rows.className = "token-shades";

          flatTokens.forEach((token) => {
            const row = document.createElement("div");
            row.className = "token-shade";

            if (isColorCategory) {
              const swatch = document.createElement("div");
              swatch.className = "token-swatch";
              if (typeof token.value === "string") {
                swatch.style.backgroundColor = token.value;
              }
              row.appendChild(swatch);
            }
            if (isGradientCategory) {
              const [, colorsPart] = String(token.value).split(":");
              const colors = colorsPart
                ? colorsPart.split(",").map((c) => c.trim())
                : [];
              if (colors.length >= 2) {
                row.style.background = `linear-gradient(90deg, ${colors.join(", ")})`;
                row.style.border = "1px solid rgba(0,0,0,0.08)";
                row.style.color = "#ffffff";
                row.style.textShadow = "0 1px 2px rgba(0,0,0,0.35)";
              }
            }

            const label = document.createElement("div");
            label.className = "token-shade-label";
            label.textContent = token.name;

            const value = document.createElement("div");
            value.className = "token-shade-value";
            value.textContent = String(token.value ?? "");

            row.appendChild(label);
            row.appendChild(value);

            if (isColorCategory) {
              row.addEventListener("click", () => {
                if (!currentNodeId) {
                  console.log("No node selected");
                  return;
                }

                parent.postMessage(
                  {
                    pluginMessage: {
                      type: "apply-token",
                      nodeId: currentNodeId,
                      colorName: token.name,
                      shade: "default",
                    },
                  },
                  "*",
                );
              });
            } else if (isGradientCategory) {
              row.addEventListener("click", () => {
                if (!currentNodeId) {
                  console.log("No node selected");
                  return;
                }

                parent.postMessage(
                  {
                    pluginMessage: {
                      type: "apply-gradient-token",
                      nodeId: currentNodeId,
                      tokenName: token.name,
                    },
                  },
                  "*",
                );
              });
            } else if (currentTokenCategory === "spacing") {
              row.addEventListener("click", () => {
                if (!currentNodeId) {
                  console.log("No node selected");
                  return;
                }

                // Get the selected property from the dropdown
                const selector = document.getElementById(
                  "spacing-property-select",
                );
                const property = selector ? selector.value : "padding";

                if (!property) return;

                parent.postMessage(
                  {
                    pluginMessage: {
                      type: "apply-spacing-token",
                      nodeId: currentNodeId,
                      tokenName: token.name,
                      property: property,
                    },
                  },
                  "*",
                );
              });
            } else if (currentTokenCategory === "typography") {
              // For typography, token.name is the subcategory (fontSize, fontFamily, etc.)
            }

            rows.appendChild(row);
          });

          group.appendChild(rows);
          tokenTree.appendChild(group);
        }

        if (!tokenTree.hasChildNodes()) {
          const empty = document.createElement("div");
          empty.className = "property-value";
          empty.textContent = "No matching tokens";
          tokenTree.appendChild(empty);
        }
      }

      // Syncs search input to live token tree filtering
      // Updates tokenSearchQuery and rerenders the token browser whenever the search input changes
      if (tokenSearchInput) {
        tokenSearchInput.addEventListener("input", () => {
          tokenSearchQuery = tokenSearchInput.value || "";
          renderTokenTree();
        });
      }

      /* === Render Functions === */
      /* Display all node properties in the Editable Fields section */
      function renderProperties(data) {
        properties.innerHTML = "";
        if (!data) return;

        const allKeys = Object.keys(data).filter((key) => key !== "children");
        const orderedKeys = [
          ...propertyOrder.filter((key) => allKeys.includes(key)),
          ...allKeys.filter((key) => !propertyOrder.includes(key)),
        ];

        orderedKeys.forEach((key) => {
          const row = document.createElement("div");
          row.className = "property-row";

          const keyLabel = document.createElement("div");
          keyLabel.className = "property-key";
          keyLabel.textContent = propertyLabels[key] || key;

          let valueEl;
          const config = editableConfig[key];
          if (config) {
            const rawValue = config.getValue
              ? config.getValue(data[key])
              : data[key];
            const isMixed = rawValue === null && config.allowMixed;

            if (
              isMixed &&
              key === "padding" &&
              data[key] &&
              typeof data[key] === "object"
            ) {
              const grid = document.createElement("div");
              grid.className = "property-subgrid";
              const sides = [
                { label: "Top", field: "top" },
                { label: "Right", field: "right" },
                { label: "Bottom", field: "bottom" },
                { label: "Left", field: "left" },
              ];

              sides.forEach(({ label, field }) => {
                const wrap = document.createElement("div");
                wrap.className = "property-subfield";
                const lab = document.createElement("label");
                lab.textContent = label;
                const sideInput = document.createElement("input");
                sideInput.type = "number";
                sideInput.className = "property-input";
                sideInput.value = String(data[key][field] ?? 0);
                sideInput.addEventListener("change", () => {
                  if (currentNodeId === null) return;
                  const top = Number(
                    field === "top" ? sideInput.value : (data[key].top ?? 0),
                  );
                  const right = Number(
                    field === "right"
                      ? sideInput.value
                      : (data[key].right ?? 0),
                  );
                  const bottom = Number(
                    field === "bottom"
                      ? sideInput.value
                      : (data[key].bottom ?? 0),
                  );
                  const left = Number(
                    field === "left" ? sideInput.value : (data[key].left ?? 0),
                  );
                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "update-node",
                        nodeId: currentNodeId,
                        property: "padding",
                        value: { top, right, bottom, left },
                      },
                    },
                    "*",
                  );
                });
                wrap.appendChild(lab);
                wrap.appendChild(sideInput);
                grid.appendChild(wrap);
              });
              valueEl = grid;
            } else if (
              isMixed &&
              key === "cornerRadius" &&
              data[key] &&
              typeof data[key] === "object"
            ) {
              const grid = document.createElement("div");
              grid.className = "property-subgrid";
              const corners = [
                { label: "Top Left", field: "topLeft" },
                { label: "Top Right", field: "topRight" },
                { label: "Bottom Right", field: "bottomRight" },
                { label: "Bottom Left", field: "bottomLeft" },
              ];

              corners.forEach(({ label, field }) => {
                const wrap = document.createElement("div");
                wrap.className = "property-subfield";
                const lab = document.createElement("label");
                lab.textContent = label;
                const cornerInput = document.createElement("input");
                cornerInput.type = "number";
                cornerInput.className = "property-input";
                cornerInput.value = String(data[key][field] ?? 0);
                cornerInput.addEventListener("change", () => {
                  if (currentNodeId === null) return;
                  const topLeft = Number(
                    field === "topLeft"
                      ? cornerInput.value
                      : (data[key].topLeft ?? 0),
                  );
                  const topRight = Number(
                    field === "topRight"
                      ? cornerInput.value
                      : (data[key].topRight ?? 0),
                  );
                  const bottomRight = Number(
                    field === "bottomRight"
                      ? cornerInput.value
                      : (data[key].bottomRight ?? 0),
                  );
                  const bottomLeft = Number(
                    field === "bottomLeft"
                      ? cornerInput.value
                      : (data[key].bottomLeft ?? 0),
                  );
                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "update-node",
                        nodeId: currentNodeId,
                        property: "cornerRadius",
                        value: { topLeft, topRight, bottomRight, bottomLeft },
                      },
                    },
                    "*",
                  );
                });
                wrap.appendChild(lab);
                wrap.appendChild(cornerInput);
                grid.appendChild(wrap);
              });
              valueEl = grid;
            } else {
              const input = document.createElement("input");
              input.className = "property-input";
              input.type = config.type === "number" ? "number" : "text";
              if (config.min !== undefined) input.min = String(config.min);
              if (config.max !== undefined) input.max = String(config.max);
              if (config.step !== undefined) input.step = String(config.step);

              if (
                rawValue === null ||
                rawValue === undefined ||
                rawValue === ""
              ) {
                input.value = "";
                input.placeholder = "mixed";
                input.disabled = true;
              } else {
                input.value = String(rawValue);
              }

              input.addEventListener("change", () => {
                if (currentNodeId === null || input.disabled) return;
                const nextValue =
                  config.type === "number" ? Number(input.value) : input.value;
                if (config.type === "number" && !Number.isFinite(nextValue)) {
                  input.value = String(rawValue ?? "");
                  return;
                }
                parent.postMessage(
                  {
                    pluginMessage: {
                      type: "update-node",
                      nodeId: currentNodeId,
                      property: key,
                      value: nextValue,
                    },
                  },
                  "*",
                );
              });
              valueEl = input;
            }
          } else {
            const valueLabel = document.createElement("div");
            valueLabel.className = "property-value";
            valueLabel.textContent = toDisplayValue(data[key]);
            valueEl = valueLabel;
          }

          row.appendChild(keyLabel);
          row.appendChild(valueEl);
          properties.appendChild(row);
        });
      }

      /* === Color Conversion === */
      /* Convert RGB object (0-1 values) to hex string (#RRGGBB) */
      /* Example: {r: 1, g: 0.5, b: 0} becomes "#ff7f00" */
      function rgbToHex(color) {
        if (!color) return null;
        const r = Math.round(color.r * 255)
          .toString(16)
          .padStart(2, "0");
        const g = Math.round(color.g * 255)
          .toString(16)
          .padStart(2, "0");
        const b = Math.round(color.b * 255)
          .toString(16)
          .padStart(2, "0");
        return `#${r}${g}${b}`;
      }

      function getReadableTextColor(hex) {
        if (!hex || typeof hex !== "string") return "#111827";
        const cleaned = hex.replace("#", "");
        if (cleaned.length !== 6) return "#111827";
        const r = parseInt(cleaned.slice(0, 2), 16);
        const g = parseInt(cleaned.slice(2, 4), 16);
        const b = parseInt(cleaned.slice(4, 6), 16);
        const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        return luminance > 0.6 ? "#111827" : "#ffffff";
      }

      function renderSwatches(data) {
        colorSwatches.innerHTML = "";
        if (!data) return;

        const swatches = [];
        const seen = new Set();

        /* Helper to add unique color swatch (avoids duplicates) */
        function addSwatch(name, hex) {
          if (!hex || seen.has(hex)) return;
          seen.add(hex);
          swatches.push({ name, value: hex });
        }

        /* Rechecks node tree to collect all fill/stroke colors */
        /* Checks fills/strokes arrays first, then falls back to single fill/stroke */
        function collectNodeColors(node) {
          if (!node) return;

          if (Array.isArray(node.fills) && node.fills.length > 0) {
            node.fills.forEach((fill, index) => {
              if (fill && fill.type === "SOLID" && fill.color) {
                const hex = rgbToHex(fill.color);
                addSwatch(`Fill ${index + 1}`, hex);
              }
            });
          } else if (node.fill) {
            addSwatch("Fill", node.fill);
          }

          if (Array.isArray(node.strokes) && node.strokes.length > 0) {
            node.strokes.forEach((stroke, index) => {
              if (stroke && stroke.type === "SOLID" && stroke.color) {
                const hex = rgbToHex(stroke.color);
                addSwatch(`Stroke ${index + 1}`, hex);
              }
            });
          } else if (node.stroke && node.stroke.color) {
            addSwatch("Stroke", node.stroke.color);
          }

          if (Array.isArray(node.children)) {
            node.children.forEach((child) => collectNodeColors(child));
          }
        }

        collectNodeColors(data);

        if (swatches.length === 0) {
          const empty = document.createElement("div");
          empty.className = "property-value";
          empty.textContent = "No colors found";
          colorSwatches.appendChild(empty);
          return;
        }

        swatches.forEach((swatch) => {
          const item = document.createElement("div");
          item.className = "swatch";

          const color = document.createElement("div");
          color.className = "swatch-color";
          color.style.background = swatch.value;

          const labels = document.createElement("div");
          labels.className = "swatch-labels";

          const name = document.createElement("div");
          name.className = "swatch-name";
          name.textContent = swatch.name;

          const value = document.createElement("div");
          value.className = "swatch-value";
          value.textContent = swatch.value;

          labels.appendChild(name);
          labels.appendChild(value);
          item.appendChild(color);
          item.appendChild(labels);
          colorSwatches.appendChild(item);
        });
      }

      function renderChildFills(data) {
        childFills.innerHTML = "";
        if (!data) return;

        const rows = [];

        function visit(node) {
          if (!node) return;
          if (node.id && node.fill) {
            rows.push({
              id: node.id,
              name: node.name || node.id,
              fill: node.fill,
            });
          }
          if (Array.isArray(node.children)) {
            node.children.forEach((child) => visit(child));
          }
        }

        visit(data);

        if (rows.length === 0) {
          const empty = document.createElement("div");
          empty.className = "property-value";
          empty.textContent = "No child fills found";
          childFills.appendChild(empty);
          return;
        }

        rows.forEach((row) => {
          const item = document.createElement("div");
          item.className = "child-fill-row";

          const name = document.createElement("div");
          name.className = "child-fill-name";
          name.textContent = row.name;

          const swatch = document.createElement("div");
          swatch.className = "child-fill-swatch";
          swatch.style.background = row.fill;

          const input = document.createElement("input");
          input.type = "text";
          input.className = "property-input";
          input.value = row.fill;
          input.addEventListener("change", () => {
            if (currentNodeId === null) return;
            parent.postMessage(
              {
                pluginMessage: {
                  type: "update-node",
                  nodeId: row.id,
                  parentId: currentNodeId,
                  property: "fill",
                  value: input.value,
                },
              },
              "*",
            );
          });

          item.appendChild(name);
          item.appendChild(swatch);
          item.appendChild(input);
          childFills.appendChild(item);
        });
      }

      /* Display code based on current mode (html/tailwind) */
      function renderCode() {
        codeOutput.textContent = getCodeForMode();
      }

      /* Recalculate open collapsible heights after content updates */
      function refreshOpenCollapsibles() {
        const openButtons = document.querySelectorAll(".collapsible.active");
        openButtons.forEach((button) => {
          const content = button.nextElementSibling;
          if (!content) return;
          content.style.maxHeight = content.scrollHeight + "px";
        });
      }

      /* Switch between HTML+CSS, HTML+Tailwind, and React+Tailwind modes */
      function setMode(mode) {
        appState.mode = mode;
        tabHtml.classList.toggle("active", mode === "html");
        tabTailwind.classList.toggle("active", mode === "tailwind");
        tabReactTailwind.classList.toggle("active", mode === "react-tailwind");
        renderCode();
      }

      /* Copy current code to clipboard using textarea + execCommand */
      /* Shows temporary "Copied" message on button */
      function copyCode() {
        const text = getCodeForMode();
        if (!text) return;

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);

        copyButton.textContent = "Copied";
        setTimeout(() => {
          copyButton.textContent = "Copy";
        }, 1200);
      }

      /* Download current code as HTML file based on mode */
      function downloadCode() {
        const text = getCodeForMode();
        const isReactMode = appState.mode === "react-tailwind";
        const blob = new Blob([text], {
          type: isReactMode ? "text/javascript" : "text/html",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        if (appState.mode === "html") {
          link.download = "code.html";
        } else if (appState.mode === "tailwind") {
          link.download = "tailwind.html";
        } else {
          link.download = "component.jsx";
        }
        link.click();
        URL.revokeObjectURL(url);
      }

      function updateSelection(message) {
        currentNodeId = message.data?.id || null;
        frameName.textContent = message.data?.name || "Unnamed frame";
        renderProperties(message.data);
        renderSwatches(message.data);
        renderChildFills(message.data);
        renderTokenTabs();
        renderTokenTree();
        appState.html = message.html || "";
        appState.tailwind = message.tailwind || "";
        appState.reactTailwind = message.reactTailwind || "";
        renderCode();
        requestAnimationFrame(refreshOpenCollapsibles);
      }

      function clearSelection() {
        currentNodeId = null;
        frameName.textContent = "No selection";
        properties.innerHTML = "";
        colorSwatches.innerHTML = "";
        childFills.innerHTML = "";
        appState.html = "";
        appState.tailwind = "";
        appState.reactTailwind = "";
        renderCode();
        requestAnimationFrame(refreshOpenCollapsibles);
      }

      /* === Event Handlers === */
      tabHtml.addEventListener("click", () => setMode("html"));
      tabTailwind.addEventListener("click", () => setMode("tailwind"));
      tabReactTailwind.addEventListener("click", () =>
        setMode("react-tailwind"),
      );
      copyButton.addEventListener("click", copyCode);
      downloadButton.addEventListener("click", downloadCode);
      popoutButton.addEventListener("click", () => {
        isPoppedOut = !isPoppedOut;
        popoutButton.textContent = isPoppedOut ? "Dock" : "Pop out";
        parent.postMessage(
          { pluginMessage: { type: "toggle-popout", poppedOut: isPoppedOut } },
          "*",
        );
      });

      /* === Collapsible Functionality (W3Schools pattern) === */
      var coll = document.getElementsByClassName("collapsible");
      var i;

      for (i = 0; i < coll.length; i++) {
        coll[i].addEventListener("click", function () {
          this.classList.toggle("active");
          var content = this.nextElementSibling;
          if (content.style.maxHeight) {
            content.classList.remove("open");
            content.style.maxHeight = null;
          } else {
            content.classList.add("open");
            content.style.maxHeight = content.scrollHeight + "px";
          }
        });
      }

      /* === Message Handling === */
      /* Receives updates from plugin code when selection changes */
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "selection-update") updateSelection(message);
        if (message.type === "no-selection") clearSelection();
        if (message.type === "custom-tokens-update") {
          // This branch updates local custom token state from plugin storage data.
          customColors =
            message.colors && typeof message.colors === "object"
              ? message.colors
              : {};
          customGradients =
            message.gradients && typeof message.gradients === "object"
              ? message.gradients
              : {};
          availableFontFamilies = Array.isArray(message.availableFontFamilies)
            ? message.availableFontFamilies
                .map((fontFamily) => String(fontFamily || "").trim())
                .filter(Boolean)
            : [];
          applyCustomTokensToRegistry();
          renderSavedGradientOptions();
          renderTokenTabs();
          renderTokenTree();
        }
      };

      requestCustomTokensFromPlugin();
    </script>
  </body>
</html>
