<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Simple HTML Codegen</title>
    <style>
      * {
        box-sizing: border-box;
      }

      /* === Base Styles === */
      body {
        margin: 0;
        padding: 16px;
        background: #f4f6fb;
        color: #1f2937;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Arial;
      }

      /* === Panel Layout === */
      .panel {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .panel-title-group {
        display: flex;
        flex-direction: column;
      }

      .popout-btn {
        padding: 6px 10px;
        font-size: 12px;
      }

      /* === Typography === */
      .title {
        font-size: 18px;
        font-weight: 650;
        margin: 0 0 10px;
      }

      .subtitle {
        font-size: 12.5px;
        color: #6b7280;
        margin: 0 0 10px;
      }

      /* === Properties List === */
      .properties {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* === Individual property row with key-value pair === */
      .property-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #f9fafb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .property-key {
        min-width: 130px;
        color: #6b7280;
        font-size: 13px;
      }

      .property-value {
        font-size: 13px;
        word-break: break-word;
      }

      .property-input {
        width: 100%;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #1f2937;
        font-size: 13px;
      }

      .property-input:focus {
        outline: none;
        border-color: #2563eb;
      }

      .property-subgrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        width: 100%;
      }

      .property-subfield {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .property-subfield label {
        font-size: 11px;
        color: #6b7280;
      }

      /* === Tabs & Buttons === */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      /* === button styling === */
      .button {
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #1f2937;
        cursor: pointer;
        font-size: 13px;
        transition:
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .button:hover {
        background: #f3f4f6;
      }

      .button.active {
        border-color: #2563eb;
        color: #2563eb;
        background: rgba(37, 99, 235, 0.1);
      }

      .button.muted {
        color: #6b7280;
      }

      /* === Code Output Display === */
      pre {
        margin: 0;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        overflow: visible;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 20px;
        tab-size: 2;
        color: #1f2937;
      }

      /* === buttons container (Copy, Download) === */
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 12px;
      }

      /* === Color Swatches === */
      /* === Container for color chips === */
      .swatches {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      /* === Individual color swatch item === */
      .swatch {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 8px 10px;
        background: #f9fafb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .swatch-color {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #e5e7eb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }

      .swatch-labels {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .swatch-name {
        font-size: 12px;
        color: #6b7280;
      }

      .swatch-value {
        font-size: 12px;
        color: #1f2937;
      }

      /* === Child Fills === */
      .child-fills {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .child-fill-row {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 8px 10px;
        background: #f9fafb;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .child-fill-name {
        min-width: 120px;
        font-size: 12px;
        color: #6b7280;
      }

      .child-fill-swatch {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid #e5e7eb;
        flex-shrink: 0;
      }

      /* === Collapsible (W3Schools) === */
      .collapsible {
        background-color: transparent;
        color: #1f2937;
        cursor: pointer;
        padding: 12px 14px;
        width: 100%;
        border: none;
        text-align: left;
        outline: none;
        font-size: 14px;
        font-weight: 600;
        transition: 0.4s;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 10px;
      }

      .active,
      .collapsible:hover {
        background-color: #f3f4f6;
      }

      .collapsible:after {
        content: "\002B";
        color: #6b7280;
        font-weight: bold;
        margin-left: auto;
      }

      .active:after {
        content: "\2212";
      }

      .content {
        padding: 0 14px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease-out;
        background-color: transparent;
      }

      .content.open {
        padding: 8px 14px 12px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title-group">
          <p class="title">Simple HTML Codegen</p>
          <p class="subtitle">Selected Frame</p>
        </div>
        <button class="button popout-btn" id="popout-btn">Pop out</button>
      </div>
      <div id="frame-name">No selection</div>
    </div>

    <div class="panel">
      <button type="button" class="collapsible">Editable Fields</button>
      <div class="content">
        <div id="properties" class="properties" aria-live="polite"></div>
        <div class="subtitle" style="margin-top: 14px">Child Fills</div>
        <div id="child-fills" class="child-fills" aria-live="polite"></div>
      </div>
    </div>

    <div class="panel">
      <button type="button" class="collapsible">Color Swatches</button>
      <div class="content">
        <div id="color-swatches" class="swatches" aria-live="polite"></div>
      </div>
    </div>

    <div class="panel">
      <button type="button" class="collapsible">Live Code Preview</button>
      <div class="content">
        <div class="tabs">
          <button class="button active" id="tab-html">HTML + CSS</button>
          <button class="button" id="tab-tailwind">HTML + Tailwind</button>
        </div>
        <pre id="code-output" aria-live="polite"></pre>
        <div class="actions">
          <button class="button" id="copy-btn">Copy</button>
          <button class="button muted" id="download-btn">Download</button>
        </div>
      </div>
    </div>

    <script>
      /* === DOM Elements === */
      const frameName = document.getElementById("frame-name");
      const properties = document.getElementById("properties");
      const colorSwatches = document.getElementById("color-swatches");
      const childFills = document.getElementById("child-fills");
      const codeOutput = document.getElementById("code-output");
      const tabHtml = document.getElementById("tab-html");
      const tabTailwind = document.getElementById("tab-tailwind");
      const copyButton = document.getElementById("copy-btn");
      const downloadButton = document.getElementById("download-btn");
      const popoutButton = document.getElementById("popout-btn");

      /* === App State === */
      /* Tracks current mode (html/tailwind) and generated code */
      const appState = {
        mode: "html",
        html: "",
        tailwind: "",
      };

      let isPoppedOut = false;
      let currentNodeId = null;

      const editableConfig = {
        x: { type: "number" },
        y: { type: "number" },
        width: { type: "number" },
        height: { type: "number" },
        rotation: { type: "number" },
        opacity: { type: "number", min: 0, max: 1, step: 0.01 },
        cornerRadius: {
          type: "number",
          getValue: (value) =>
            value && typeof value.all === "number" ? value.all : null,
          allowMixed: true,
        },
        padding: {
          type: "number",
          getValue: (value) => {
            if (typeof value === "number") return value;
            if (!value || typeof value !== "object") return null;
            const { top = 0, right = 0, bottom = 0, left = 0 } = value;
            return top === right && right === bottom && bottom === left
              ? top
              : null;
          },
          allowMixed: true,
        },
        itemSpacing: { type: "number" },
        layoutGrow: { type: "number" },
        fontSize: { type: "number" },
        characters: { type: "text" },
        name: { type: "text" },
        fill: { type: "text" },
        stroke: {
          type: "text",
          getValue: (value) => (value && value.color ? value.color : ""),
        },
        strokeWeight: { type: "number" },
        strokeAlign: { type: "text" },
        layoutAlign: { type: "text" },
      };

      /* === Property Order === */
      /* Defines preferred order for displaying properties  */
      const propertyOrder = [
        "id",
        "name",
        "type",
        "width",
        "height",
        "x",
        "y",
        "rotation",
        "layoutMode",
        "itemSpacing",
        "gap",
        "padding",
        "cornerRadius",
        "fill",
        "stroke",
        "strokeWeight",
        "strokeAlign",
        "layoutGrow",
        "layoutAlign",
        "fontSize",
        "fontName",
        "characters",
        "textAlignHorizontal",
        "fills",
        "strokes",
      ];

      const propertyLabels = {
        itemSpacing: "Gap",
      };

      /* === Utility Functions === */
      /* Convert any value to displayable string, handling objects and nulls */
      function toDisplayValue(value) {
        if (value === undefined || value === null) return "—";
        if (typeof value === "string" || typeof value === "number") {
          return String(value);
        }
        return JSON.stringify(value);
      }

      /* Return the current code based on selected mode */
      function getCodeForMode() {
        return appState.mode === "html" ? appState.html : appState.tailwind;
      }

      /* === Render Functions === */
      /* Display all node properties in the Editable Fields section */
      function renderProperties(data) {
        properties.innerHTML = "";
        if (!data) return;

        const allKeys = Object.keys(data).filter((key) => key !== "children");
        const orderedKeys = [
          ...propertyOrder.filter((key) => allKeys.includes(key)),
          ...allKeys.filter((key) => !propertyOrder.includes(key)),
        ];

        orderedKeys.forEach((key) => {
          const row = document.createElement("div");
          row.className = "property-row";

          const keyLabel = document.createElement("div");
          keyLabel.className = "property-key";
          keyLabel.textContent = propertyLabels[key] || key;

          let valueEl;
          const config = editableConfig[key];
          if (config) {
            const rawValue = config.getValue
              ? config.getValue(data[key])
              : data[key];
            const isMixed = rawValue === null && config.allowMixed;

            if (
              isMixed &&
              key === "padding" &&
              data[key] &&
              typeof data[key] === "object"
            ) {
              const grid = document.createElement("div");
              grid.className = "property-subgrid";
              const sides = [
                { label: "Top", field: "top" },
                { label: "Right", field: "right" },
                { label: "Bottom", field: "bottom" },
                { label: "Left", field: "left" },
              ];

              sides.forEach(({ label, field }) => {
                const wrap = document.createElement("div");
                wrap.className = "property-subfield";
                const lab = document.createElement("label");
                lab.textContent = label;
                const sideInput = document.createElement("input");
                sideInput.type = "number";
                sideInput.className = "property-input";
                sideInput.value = String(data[key][field] ?? 0);
                sideInput.addEventListener("change", () => {
                  if (currentNodeId === null) return;
                  const top = Number(
                    field === "top" ? sideInput.value : (data[key].top ?? 0),
                  );
                  const right = Number(
                    field === "right"
                      ? sideInput.value
                      : (data[key].right ?? 0),
                  );
                  const bottom = Number(
                    field === "bottom"
                      ? sideInput.value
                      : (data[key].bottom ?? 0),
                  );
                  const left = Number(
                    field === "left" ? sideInput.value : (data[key].left ?? 0),
                  );
                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "update-node",
                        nodeId: currentNodeId,
                        property: "padding",
                        value: { top, right, bottom, left },
                      },
                    },
                    "*",
                  );
                });
                wrap.appendChild(lab);
                wrap.appendChild(sideInput);
                grid.appendChild(wrap);
              });
              valueEl = grid;
            } else if (
              isMixed &&
              key === "cornerRadius" &&
              data[key] &&
              typeof data[key] === "object"
            ) {
              const grid = document.createElement("div");
              grid.className = "property-subgrid";
              const corners = [
                { label: "Top Left", field: "topLeft" },
                { label: "Top Right", field: "topRight" },
                { label: "Bottom Right", field: "bottomRight" },
                { label: "Bottom Left", field: "bottomLeft" },
              ];

              corners.forEach(({ label, field }) => {
                const wrap = document.createElement("div");
                wrap.className = "property-subfield";
                const lab = document.createElement("label");
                lab.textContent = label;
                const cornerInput = document.createElement("input");
                cornerInput.type = "number";
                cornerInput.className = "property-input";
                cornerInput.value = String(data[key][field] ?? 0);
                cornerInput.addEventListener("change", () => {
                  if (currentNodeId === null) return;
                  const topLeft = Number(
                    field === "topLeft"
                      ? cornerInput.value
                      : (data[key].topLeft ?? 0),
                  );
                  const topRight = Number(
                    field === "topRight"
                      ? cornerInput.value
                      : (data[key].topRight ?? 0),
                  );
                  const bottomRight = Number(
                    field === "bottomRight"
                      ? cornerInput.value
                      : (data[key].bottomRight ?? 0),
                  );
                  const bottomLeft = Number(
                    field === "bottomLeft"
                      ? cornerInput.value
                      : (data[key].bottomLeft ?? 0),
                  );
                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "update-node",
                        nodeId: currentNodeId,
                        property: "cornerRadius",
                        value: { topLeft, topRight, bottomRight, bottomLeft },
                      },
                    },
                    "*",
                  );
                });
                wrap.appendChild(lab);
                wrap.appendChild(cornerInput);
                grid.appendChild(wrap);
              });
              valueEl = grid;
            } else {
              const input = document.createElement("input");
              input.className = "property-input";
              input.type = config.type === "number" ? "number" : "text";
              if (config.min !== undefined) input.min = String(config.min);
              if (config.max !== undefined) input.max = String(config.max);
              if (config.step !== undefined) input.step = String(config.step);

              if (
                rawValue === null ||
                rawValue === undefined ||
                rawValue === ""
              ) {
                input.value = "";
                input.placeholder = "mixed";
                input.disabled = true;
              } else {
                input.value = String(rawValue);
              }

              input.addEventListener("change", () => {
                if (currentNodeId === null || input.disabled) return;
                const nextValue =
                  config.type === "number" ? Number(input.value) : input.value;
                if (config.type === "number" && !Number.isFinite(nextValue)) {
                  input.value = String(rawValue ?? "");
                  return;
                }
                parent.postMessage(
                  {
                    pluginMessage: {
                      type: "update-node",
                      nodeId: currentNodeId,
                      property: key,
                      value: nextValue,
                    },
                  },
                  "*",
                );
              });
              valueEl = input;
            }
          } else {
            const valueLabel = document.createElement("div");
            valueLabel.className = "property-value";
            valueLabel.textContent = toDisplayValue(data[key]);
            valueEl = valueLabel;
          }

          row.appendChild(keyLabel);
          row.appendChild(valueEl);
          properties.appendChild(row);
        });
      }

      /* === Color Conversion === */
      /* Convert RGB object (0-1 values) to hex string (#RRGGBB) */
      /* Example: {r: 1, g: 0.5, b: 0} becomes "#ff7f00" */
      function rgbToHex(color) {
        if (!color) return null;
        const r = Math.round(color.r * 255)
          .toString(16)
          .padStart(2, "0");
        const g = Math.round(color.g * 255)
          .toString(16)
          .padStart(2, "0");
        const b = Math.round(color.b * 255)
          .toString(16)
          .padStart(2, "0");
        return `#${r}${g}${b}`;
      }

      function renderSwatches(data) {
        colorSwatches.innerHTML = "";
        if (!data) return;

        const swatches = [];
        const seen = new Set();

        /* Helper to add unique color swatch (avoids duplicates) */
        function addSwatch(name, hex) {
          if (!hex || seen.has(hex)) return;
          seen.add(hex);
          swatches.push({ name, value: hex });
        }

        /* Rechecks node tree to collect all fill/stroke colors */
        /* Checks fills/strokes arrays first, then falls back to single fill/stroke */
        function collectNodeColors(node) {
          if (!node) return;

          if (Array.isArray(node.fills) && node.fills.length > 0) {
            node.fills.forEach((fill, index) => {
              if (fill && fill.type === "SOLID" && fill.color) {
                const hex = rgbToHex(fill.color);
                addSwatch(`Fill ${index + 1}`, hex);
              }
            });
          } else if (node.fill) {
            addSwatch("Fill", node.fill);
          }

          if (Array.isArray(node.strokes) && node.strokes.length > 0) {
            node.strokes.forEach((stroke, index) => {
              if (stroke && stroke.type === "SOLID" && stroke.color) {
                const hex = rgbToHex(stroke.color);
                addSwatch(`Stroke ${index + 1}`, hex);
              }
            });
          } else if (node.stroke && node.stroke.color) {
            addSwatch("Stroke", node.stroke.color);
          }

          if (Array.isArray(node.children)) {
            node.children.forEach((child) => collectNodeColors(child));
          }
        }

        collectNodeColors(data);

        if (swatches.length === 0) {
          const empty = document.createElement("div");
          empty.className = "property-value";
          empty.textContent = "No colors found";
          colorSwatches.appendChild(empty);
          return;
        }

        swatches.forEach((swatch) => {
          const item = document.createElement("div");
          item.className = "swatch";

          const color = document.createElement("div");
          color.className = "swatch-color";
          color.style.background = swatch.value;

          const labels = document.createElement("div");
          labels.className = "swatch-labels";

          const name = document.createElement("div");
          name.className = "swatch-name";
          name.textContent = swatch.name;

          const value = document.createElement("div");
          value.className = "swatch-value";
          value.textContent = swatch.value;

          labels.appendChild(name);
          labels.appendChild(value);
          item.appendChild(color);
          item.appendChild(labels);
          colorSwatches.appendChild(item);
        });
      }

      function renderChildFills(data) {
        childFills.innerHTML = "";
        if (!data) return;

        const rows = [];

        function visit(node) {
          if (!node) return;
          if (node.id && node.fill) {
            rows.push({
              id: node.id,
              name: node.name || node.id,
              fill: node.fill,
            });
          }
          if (Array.isArray(node.children)) {
            node.children.forEach((child) => visit(child));
          }
        }

        visit(data);

        if (rows.length === 0) {
          const empty = document.createElement("div");
          empty.className = "property-value";
          empty.textContent = "No child fills found";
          childFills.appendChild(empty);
          return;
        }

        rows.forEach((row) => {
          const item = document.createElement("div");
          item.className = "child-fill-row";

          const name = document.createElement("div");
          name.className = "child-fill-name";
          name.textContent = row.name;

          const swatch = document.createElement("div");
          swatch.className = "child-fill-swatch";
          swatch.style.background = row.fill;

          const input = document.createElement("input");
          input.type = "text";
          input.className = "property-input";
          input.value = row.fill;
          input.addEventListener("change", () => {
            if (currentNodeId === null) return;
            parent.postMessage(
              {
                pluginMessage: {
                  type: "update-node",
                  nodeId: row.id,
                  parentId: currentNodeId,
                  property: "fill",
                  value: input.value,
                },
              },
              "*",
            );
          });

          item.appendChild(name);
          item.appendChild(swatch);
          item.appendChild(input);
          childFills.appendChild(item);
        });
      }

      /* Display code based on current mode (html/tailwind) */
      function renderCode() {
        codeOutput.textContent = getCodeForMode();
      }

      /* Recalculate open collapsible heights after content updates */
      function refreshOpenCollapsibles() {
        const openButtons = document.querySelectorAll(".collapsible.active");
        openButtons.forEach((button) => {
          const content = button.nextElementSibling;
          if (!content) return;
          content.style.maxHeight = content.scrollHeight + "px";
        });
      }

      /* Switch between HTML+CSS and HTML+Tailwind modes */
      function setMode(mode) {
        appState.mode = mode;
        tabHtml.classList.toggle("active", mode === "html");
        tabTailwind.classList.toggle("active", mode === "tailwind");
        renderCode();
      }

      /* Copy current code to clipboard using textarea + execCommand */
      /* Shows temporary "Copied" message on button */
      function copyCode() {
        const text = getCodeForMode();
        if (!text) return;

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);

        copyButton.textContent = "Copied";
        setTimeout(() => {
          copyButton.textContent = "Copy";
        }, 1200);
      }

      /* Download current code as HTML file based on mode */
      function downloadCode() {
        const text = getCodeForMode();
        const blob = new Blob([text], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download =
          appState.mode === "html" ? "code.html" : "tailwind.html";
        link.click();
        URL.revokeObjectURL(url);
      }

      function updateSelection(message) {
        currentNodeId = message.data?.id || null;
        frameName.textContent = message.data?.name || "Unnamed frame";
        renderProperties(message.data);
        renderSwatches(message.data);
        renderChildFills(message.data);
        appState.html = message.html || "";
        appState.tailwind = message.tailwind || "";
        renderCode();
        requestAnimationFrame(refreshOpenCollapsibles);
      }

      function clearSelection() {
        currentNodeId = null;
        frameName.textContent = "No selection";
        properties.innerHTML = "";
        colorSwatches.innerHTML = "";
        childFills.innerHTML = "";
        appState.html = "";
        appState.tailwind = "";
        renderCode();
        requestAnimationFrame(refreshOpenCollapsibles);
      }

      /* === Event Handlers === */
      tabHtml.addEventListener("click", () => setMode("html"));
      tabTailwind.addEventListener("click", () => setMode("tailwind"));
      copyButton.addEventListener("click", copyCode);
      downloadButton.addEventListener("click", downloadCode);
      popoutButton.addEventListener("click", () => {
        isPoppedOut = !isPoppedOut;
        popoutButton.textContent = isPoppedOut ? "Dock" : "Pop out";
        parent.postMessage(
          { pluginMessage: { type: "toggle-popout", poppedOut: isPoppedOut } },
          "*",
        );
      });

      /* === Collapsible Functionality (W3Schools pattern) === */
      var coll = document.getElementsByClassName("collapsible");
      var i;

      for (i = 0; i < coll.length; i++) {
        coll[i].addEventListener("click", function () {
          this.classList.toggle("active");
          var content = this.nextElementSibling;
          if (content.style.maxHeight) {
            content.classList.remove("open");
            content.style.maxHeight = null;
          } else {
            content.classList.add("open");
            content.style.maxHeight = content.scrollHeight + "px";
          }
        });
      }

      /* === Message Handling === */
      /* Receives updates from plugin code when selection changes */
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "selection-update") updateSelection(message);
        if (message.type === "no-selection") clearSelection();
      };
    </script>
  </body>
</html>
