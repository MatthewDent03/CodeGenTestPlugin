<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Node Properties Viewer</title>

    <style>
      :root {
        --bg: #0b0b0d;
        --panel: #0f1113;
        --muted: #9aa0a6;
        --accent: #7dd3fc;
        --card: #0f1214;
        --border: rgba(255, 255, 255, 0.04);
        --glass: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        padding: 18px;
        min-height: 100vh;
        background: var(--bg);
        color: #e6eef6;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }

      .shell {
        width: 100%;
        max-width: 780px;
        background: var(--panel);
        border-radius: 12px;
        padding: 14px;
        border: 1px solid var(--border);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .title {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #042b35;
        font-weight: 700;
      }
      h1 {
        font-size: 14px;
        margin: 0;
      }
      .subtitle {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        font-size: 13px;
        color: var(--muted);
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--border);
      }
      .status .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #334155;
        box-shadow: 0 0 0 3px rgba(51, 65, 85, 0.08);
      }

      .main {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 12px;
        margin-top: 12px;
      }

      .panel {
        background: var(--card);
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
      }
      .panel .panel-title {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 8px;
      }

      .properties {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .prop {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 8px;
        border-radius: 8px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.01),
          transparent
        );
        border: 1px solid rgba(255, 255, 255, 0.02);
      }
      .prop .k {
        font-size: 12px;
        color: var(--muted);
        min-width: 120px;
      }
      .prop .v {
        font-size: 13px;
        color: #dbeafe;
        word-break: break-all;
      }

      pre {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.6;
        padding: 10px;
        border-radius: 8px;
        background: #060608;
        color: #cfe9ff;
        border: 1px solid rgba(255, 255, 255, 0.03);
        max-height: 300px;
        overflow: auto;
      }

      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.04);
        color: var(--accent);
        padding: 6px 8px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
      }
      .btn.ghost {
        color: var(--muted);
      }

      .small-muted {
        font-size: 12px;
        color: var(--muted);
      }

      /* scrollbar */
      pre::-webkit-scrollbar,
      .panel::-webkit-scrollbar {
        height: 10px;
        width: 10px;
      }
      pre::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 6px;
      }

      @media (max-width: 760px) {
        .main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="shell">
      <div class="header">
        <div class="title">
          <div class="logo">&lt;/&gt;</div>
          <div>
            <h1>Simple HTML Codegen</h1>
          </div>
        </div>

        <!-- header right area removed to keep header minimal -->
      </div>

      <div class="main" style="grid-template-columns: 1fr">
        <div class="panel" style="min-height: 640px; padding: 18px">
          <div style="margin-bottom: 8px">
            <p class="panel-title">Full JSON</p>
          </div>
          <pre id="node-json" aria-live="polite"></pre>
        </div>
      </div>
    </div>

    <script>
      const jsonElement = document.getElementById("node-json");

      function setJsonDisplay(data) {
        if (!data) {
          jsonElement.textContent = "";
          return;
        }

        const jsonString = JSON.stringify(data, null, 2);
        const highlighted = jsonString
          .replace(/"([^"]+)":\s*/g, '<span class="json-key">"$1":</span> ')
          .replace(/:\s*"([^"]*)"/g, ': <span class="json-string">"$1"</span>')
          .replace(/:\s*(\d+\.?\d*)/g, ': <span class="json-number">$1</span>')
          .replace(/:\s*(true|false)/g, ': <span class="json-value">$1</span>')
          .replace(/:\s*null/g, ': <span class="json-null">null</span>');

        jsonElement.innerHTML = highlighted;
      }
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "selection-update") {
          setJsonDisplay(message.data);
        }

        if (message.type === "no-selection") {
          setJsonDisplay(null);
        }
      };
    </script>
  </body>
</html>
