<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Node Properties Viewer</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        background: #0e0e10;
        color: #f1f1f3;
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .shell {
        width: 100%;
        max-width: 760px;
        background: #141416;
        border: 1px solid #2b2b2f;
        border-radius: 10px;
        padding: 16px;
      }

      h3 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        font-size: 12px;
        color: #a3a3aa;
        border: 1px solid #2b2b2f;
        border-radius: 8px;
        background: #1a1a1d;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ffffff;
      }

      .card {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #2b2b2f;
        border-radius: 8px;
        background: #1c1c1f;
      }

      .card-title {
        margin: 6px;
        font-size: 12px;
        color: #a3a3aa;
      }

      pre {
        margin: 0;
        padding: 10px;
        font-size: 12px;
        background: #161618;
        border-radius: 6px;
        border: 1px solid #2b2b2f;
        color: #ffffff;
        overflow-x: auto;
        line-height: 1.8;
      }

      .json-key {
        color: #b8d4e6;
        font-weight: 500;
      }

      .json-value {
        color: #c0d8b8;
      }

      .json-string {
        color: #e6b8b8;
      }

      .json-number {
        color: #d8c0b8;
      }

      .json-null {
        color: #a8a8b8;
      }

      .properties-container {
        display: grid;
        gap: 10px;
        margin-top: 8px;
      }

      .property-row {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 12px;
        align-items: flex-start;
      }

      .property-label {
        font-size: 11px;
        color: #a3a3aa;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 500;
        padding-top: 4px;
      }

      .property-value {
        padding: 8px 10px;
        background: #161618;
        border: 1px solid #2b2b2f;
        border-radius: 6px;
        font-size: 12px;
        color: #e6b8b8;
        word-break: break-all;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="shell">
      <h3>Selected Node</h3>

      <div class="status" id="selection-status">
        <span class="dot"></span>
        <span>No selection yet.</span>
      </div>

      <div class="card">
        <p class="card-title">Node Details</p>
        <div class="properties-container" id="properties-display"></div>
        <div class="card" style="margin-top: 12px; padding: 10px">
          <p class="card-title">Full JSON</p>
          <pre id="node-json"></pre>
        </div>
      </div>
    </div>

    <script>
      const statusElement = document.getElementById("selection-status");
      const propertiesDisplay = document.getElementById("properties-display");
      const jsonElement = document.getElementById("node-json");
      const dotElement = statusElement.querySelector(".dot");
      const textElement = statusElement.querySelector("span:nth-child(2)");

      function setStatus(text, selected) {
        textElement.textContent = text;
        dotElement.style.opacity = selected ? "1" : "0.35";
      }

      function displayNodeDetails(data) {
        if (!data) {
          propertiesDisplay.innerHTML = "";
          jsonElement.textContent = "";
          return;
        }

        // Show key properties in UI-friendly format
        const keyProps = [
          "id",
          "name",
          "type",
          "width",
          "height",
          "x",
          "y",
          "rotation",
          "cornerRadius",
        ];
        let html = "";

        for (const prop of keyProps) {
          if (prop in data) {
            const value = data[prop];
            const displayValue = value === null ? "null" : String(value);
            html += `
              <div class="property-row">
                <div class="property-label">${prop}</div>
                <div class="property-value">${displayValue}</div>
              </div>
            `;
          }
        }

        propertiesDisplay.innerHTML = html;

        // Show full JSON as well
        jsonElement.textContent = JSON.stringify(data, null, 2);
      }

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "selection-update") {
          setStatus(
            `Selected: ${message.data.name} (${message.data.type})`,
            true
          );
          displayNodeDetails(message.data);
        }

        if (message.type === "no-selection") {
          setStatus("No node selected.", false);
          displayNodeDetails(null);
        }
      };
    </script>
  </body>
</html>
