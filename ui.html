<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Node Viewer</title>

    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 12px;
        font-size: 12px;
      }

      #status {
        color: #777;
        font-style: italic;
        margin-bottom: 8px;
      }

      /* JSON output area */
      #props {
        background: #f2f2f2;
        padding: 8px;
        border-radius: 4px;
        max-height: 260px;
        overflow: auto;
        font-family: monospace;
        white-space: pre;
        font-size: 11px;
      }
    </style>
  </head>

  <body>
    <!-- Title text -->
    <h3>Selected Node</h3>

    <!-- Selection status text -->
    <p id="status">No selection.</p>

    <!-- JSON property display -->
    <p id="props"></p>

    <script>
      // Stores DOM(Document Object Module) elements to update later
      const statusElement = document.getElementById("status");
      const propsElement = document.getElementById("props");

      // Receive messages from code.ts
      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        // When the user selects a node in Figma
        if (msg.type === "selection-update") {
          // Update the status line
          statusElement.textContent = `${msg.data.name} (${msg.data.type})`;

          // Show properties in formatted JSON
          propsElement.textContent = JSON.stringify(msg.data, null, 2);
        }

        // When no nodes are selected
        if (msg.type === "no-selection") {
          statusElement.textContent = "No selection.";
          statusElement.style.color = "#777";
          statusElement.style.fontStyle = "italic";

          // Clear property box
          propsElement.textContent = "";
        }
      };
    </script>
  </body>
</html>
