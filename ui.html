<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CodeGenTestPlugin</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        font-size: 12px;
      }
      #node-json {
        margin-top: 8px;
        max-height: 260px;
        overflow: auto;
        background: #f5f5f5;
        border-radius: 4px;
        padding: 8px;
        font-family: monospace;
        font-size: 11px;
      }
      .no-selection {
        color: #666;
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <h3>Selected Node Data</h3>
    <p class="no-selection" id="selection-status">No selection yet.</p>
    <pre id="node-json"></pre>

    <script>
      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;

        if (!msg) return;

        if (msg.type === "node-data") {
          const status = document.getElementById("selection-status");
          const pre = document.getElementById("node-json");
          status.textContent = `Selected: ${msg.data.name} (${msg.data.type})`;
          status.classList.remove("no-selection");
          pre.textContent = JSON.stringify(msg.data, null, 2);
        }

        if (msg.type === "no-selection") {
          document.getElementById("selection-status").textContent =
            "No node selected.";
          document
            .getElementById("selection-status")
            .classList.add("no-selection");
          document.getElementById("node-json").textContent = "";
        }
      };
    </script>
  </body>
</html>
